<style>

  /* draggable divider between viewer and terminal */
  #viewer-divider { position:absolute; left:0; right:0; bottom:var(--term-h, 45%); height:8px; margin-bottom:-4px; cursor:row-resize; z-index:51; background:transparent; }

  #viewer-divider:hover::before, body.dragging-divider #viewer-divider::before { background:#7a8392; }

  #viewer-bar { display:flex; gap:8px; align-items:center; padding:6px 10px; background:#161a1f; border-bottom:1px solid #2a2f36; font-size:12px; }

  #viewer-body { flex:1; min-height:0; display:flex; }

  #viewer-tree .row:hover { background:#1a1f25; }
  #viewer-tree .row.sel { background:#22303f; color:#fff; }
  #viewer-tree .dir::before { content:"▸ "; color:#7a8392; }
  #viewer-tree .dir.open::before { content:"▾ "; color:#7a8392; }
  #viewer-tree .file::before { content:"· "; color:#5a6371; }
  #viewer-tree .indent-1 { padding-left:24px; } #viewer-tree .indent-2 { padding-left:36px; } #viewer-tree .indent-3 { padding-left:48px; } #viewer-tree .indent-4 { padding-left:60px; } #viewer-tree .indent-5 { padding-left:72px; }
  #viewer-preview { flex:1; min-width:0; position:relative; background:#0b0d10; display:flex; flex-direction:column; }
  #viewer-tabs { display:flex; gap:4px; padding:4px 8px; background:#161a1f; border-bottom:1px solid #2a2f36; align-items:center; font-size:11px; }

  /* Always reserve scrollbar space so xterm's fit calculation doesn't

<script src="./libv86.js"></script>
<script src="./xterm.js"></script>
<script src="./xterm-addon-fit.js"></script>
<script>
(async () => {
  const $ = id => document.getElementById(id);
  const termEl = $('term'), snapEl = $('snap');
  // sLog: console-only stub (original wrote into #social-log which is gone)
  function sLog(msg, cls) { try { console.log('[social]', msg, cls || ''); } catch (_) {} }
  const bootBtn = $('boot'), resetBtn = $('reset'), saveBtn = $('save');
  const restoreBtn = $('restore'), clearBtn = $('clear');
  const renameBtn = $('rename'), cloneBtn = $('clone');
  const autosaveEl = $('autosave');
  const statusEl = $('status'), statsEl = $('stats');

  // ---- ISO catalog (was the old <select id="iso"> dropdown) ----
  // First entry is the default fresh-boot ISO.
  const ISO_CATALOG = [
    { iso: 'alpine.iso',  label: 'alpine.iso (48 MB, apk + network)' },
    { iso: 'linux4.iso',  label: 'linux4.iso (7.4 MB, busybox)' },
    { iso: 'linux3.iso',  label: 'linux3.iso (8.2 MB)' },
    { iso: 'linux.iso',   label: 'linux.iso (5.4 MB)' },
  ];
  const DEFAULT_ISO = ISO_CATALOG[0].iso;

  // ---- xterm.js terminal ----
  const term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
    fontSize: 13,
    scrollback: 5000,
    convertEol: false,
    allowProposedApi: true,
    theme: {
      background: '#0b0d10',
      foreground: '#d5d8dc',
      cursor: '#d5d8dc',
      cursorAccent: '#0b0d10',
      selectionBackground: '#334155',
      black: '#1e2229', red: '#f87171', green: '#4ade80', yellow: '#facc15',
      blue: '#60a5fa', magenta: '#c084fc', cyan: '#22d3ee', white: '#d5d8dc',
      brightBlack: '#3a424d', brightRed: '#fca5a5', brightGreen: '#86efac', brightYellow: '#fde047',
      brightBlue: '#93c5fd', brightMagenta: '#d8b4fe', brightCyan: '#67e8f9', brightWhite: '#ffffff',
    },
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(termEl);
  setTimeout(() => { try { fit.fit(); } catch (_) {} }, 0);
  const ro = new ResizeObserver(() => { try { fit.fit(); } catch (_) {} });
  ro.observe(termEl);
  window.addEventListener('resize', () => { try { fit.fit(); } catch (_) {} });

  // When fit changes size, push cols+rows to the guest (serial has no WINCH).
  // Pushing rows is necessary for Node CLIs (readline, @clack/prompts, ink,
  // etc.) — they read process.stdout.rows from termios and crash with
  // ERR_INVALID_ARG_VALUE: NaN when it's 0. We also export COLUMNS/LINES so
  // Node tools that bypass termios (and any non-TTY child processes) still
  // see a sane size. The earlier worry about "stty consuming a scrollback
  // row" is not a real feedback loop: xterm's row count is driven by the
  // container's pixel height, not by lines emitted into it.
  // Deferred until `shellReady` — otherwise xterm's initial resize fires at
  // the ISOLINUX `boot:` prompt and `stty` gets typed there, producing a
  // visible "Loading stty... failed" error before Linux starts.
  let sttyTimer = null, lastCols = 0, lastRows = 0, sentCols = 0, sentRows = 0, shellReady = false;
  const pendingGuestCommands = [];
  let flushingGuestCommands = false;
  term.onResize(({ cols, rows }) => {
    lastCols = cols;
    lastRows = rows;
    clearTimeout(sttyTimer);
    sttyTimer = setTimeout(() => {
      if (!emulator || !shellReady) return;
      if (lastCols === sentCols && lastRows === sentRows) return;
      sentCols = lastCols;
      sentRows = lastRows;
      const cmd =
        `stty cols ${lastCols} rows ${lastRows} 2>/dev/null; ` +
        `export COLUMNS=${lastCols} LINES=${lastRows}\n`;
      for (let i = 0; i < cmd.length; i++) emulator.serial0_send(cmd[i]);
    }, 600);
  });
  let byteCount = 0;

  const setStatus = (msg, cls) => { statusEl.textContent = msg; statusEl.className = cls || 'hint'; };

  // Persist autosave toggle
  autosaveEl.checked = localStorage.getItem('v86.autosave') === '1';
  autosaveEl.onchange = () => {
    localStorage.setItem('v86.autosave', autosaveEl.checked ? '1' : '0');
    if (autosaveEl.checked && emulator) {
      // Re-check the RAM gate so toggling on with a big VM gives instant feedback.
      if (currentMemMB && currentMemMB > AUTOSAVE_MEM_LIMIT_MB) {
        autosaveEl.checked = false;
        try { localStorage.setItem('v86.autosave', '0'); } catch (_) {}
        setStatus(
          `auto-save not allowed: VM has ${currentMemMB} MB RAM. Use the manual "save" button instead.`,
          'err'
        );
        return;
      }
      scheduleAutosave();
    }
  };

  // ?iso= URL param selects a fresh-boot of the given ISO (no restore).
  // Snapshot dropdown is populated dynamically (see populateSnapSelect).
  const qsIso = new URLSearchParams(location.search).get('iso');
  let initialFreshIso = DEFAULT_ISO;
  if (qsIso && ISO_CATALOG.some(o => o.iso === qsIso)) initialFreshIso = qsIso;

  // ---- Terminal output: xterm.js writes raw VT stream as-is ----
  // v86 emits one byte at a time; we batch within a microtask so xterm.js
  // parses multi-byte CSI sequences in a single write() rather than per byte.
  let pendingBytes = [], pendingFlush = false;
  let serialTextTail = '';
  function pushByte(b) {
    if (b === 10 || b === 13 || (b >= 32 && b <= 126)) {
      serialTextTail = (serialTextTail + String.fromCharCode(b)).slice(-32768);
    }
    pendingBytes.push(b);
    if (!pendingFlush) {
      pendingFlush = true;
      queueMicrotask(() => {
        pendingFlush = false;
        if (!pendingBytes.length) return;
        const u8 = new Uint8Array(pendingBytes);
        pendingBytes = [];
        term.write(u8);
      });
    }
  }

  // ---- IndexedDB snapshot persistence ----
  // Snapshot key is versioned by device topology. Bump SNAP_VER whenever
  // the v86 cfg adds/removes/reorders devices (NIC, 9P filesystem, drives,
  // etc.) — v86 serializes device state into the snapshot, and loading a
  // snapshot taken with a different device set causes a silent boot hang.
  // v2: added `filesystem: {}` (9P virtio share for in-page viewer).
  //
  // RESCUE FLAG: append `?legacy=1` to the URL to boot the pre-v2 device
  // topology AND look up the unversioned `snap:<iso>` key. Use it to recover
  // games/files saved in pre-9P snapshots — boot legacy, copy the file out
  // (e.g. via tunnel, wget upload, or paste into a terminal), then reload
  // without the flag.
  const LEGACY_BOOT = new URLSearchParams(location.search).get('legacy') === '1';
  const SNAP_VER = 'v2';
  // Multi-named snapshots: snap:<iso>:<ver>:<name>. Legacy single-snapshot
  // form (`snap:<iso>:<ver>`, no name suffix) is read transparently as the
  // synthesized name "default" and migrated to the new scheme on first save
  // or on populateSnapSelect() init.
  const DEFAULT_SNAP_NAME = 'default';
  const legacySnapKeyFor = iso => 'snap:' + iso + ':' + SNAP_VER;
  const snapKeyFor = (iso, name) => {
    if (LEGACY_BOOT) return 'snap:' + iso;
    const n = (name == null || name === '') ? DEFAULT_SNAP_NAME : String(name);
    return 'snap:' + iso + ':' + SNAP_VER + ':' + n;
  };
  // Parse a snapshot IDB key. Returns { iso, name } or null if not a
  // recognized snapshot key. Handles both new (`snap:<iso>:v2:<name>`) and
  // legacy (`snap:<iso>:v2` with no name, surfaced as DEFAULT_SNAP_NAME).
  function parseSnapKey(key) {
    if (typeof key !== 'string' || !key.startsWith('snap:')) return null;
    const rest = key.slice(5); // strip "snap:"
    // Find ":<SNAP_VER>" anchor (we only support current SNAP_VER in UI;
    // older versioned keys are ignored to avoid topology mismatch).
    const verTag = ':' + SNAP_VER;
    const verIdx = rest.indexOf(verTag);
    if (verIdx <= 0) return null;
    const iso = rest.slice(0, verIdx);
    const tail = rest.slice(verIdx + verTag.length);
    if (tail === '') return { iso, name: DEFAULT_SNAP_NAME, legacy: true };
    if (tail.startsWith(':')) return { iso, name: tail.slice(1), legacy: false };
    return null;
  }
  const DB_NAME = 'v86-snapshots', DB_VER = 1, STORE = 'snaps';
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbGet(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
      req.onsuccess = () => res(req.result || null); req.onerror = () => rej(req.error);
    });
  }
  async function idbPut(key, val) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(val, key);
      tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
    });
  }
  async function idbDel(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
    });
  }
  async function idbHas(key) { return (await idbGet(key)) != null; }
  async function idbGetAllKeys() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAllKeys();
      req.onsuccess = () => res(req.result || []); req.onerror = () => rej(req.error);
    });
  }
  async function idbCopy(srcKey, dstKey) {
    const v = await idbGet(srcKey);
    if (v == null) throw new Error('source snapshot missing');
    await idbPut(dstKey, v);
  }

  // ---- Snapshot dropdown state ----
  // Selection model: each <option> value is a snapshot IDB key
  // (`snap:<iso>:v2:<name>`) or a fresh-boot pseudo-key (`fresh:<iso>`).
  // parseSel(value) returns { iso, name|null, isFresh, key }.
  const SEL_LS_KEY = 'v86.snap-selection';
  function parseSel(val) {
    if (typeof val !== 'string' || val === '') return null;
    if (val.startsWith('fresh:')) return { iso: val.slice(6), name: null, isFresh: true, key: val };
    const p = parseSnapKey(val);
    if (!p) return null;
    return { iso: p.iso, name: p.name, isFresh: false, key: val };
  }

  // Migrate any legacy `snap:<iso>:v2` (no :name suffix) into the new
  // `snap:<iso>:v2:default` form. Idempotent. Runs once at populate.
  let legacyMigrated = false;
  async function migrateLegacySnapshots() {
    if (legacyMigrated || LEGACY_BOOT) return;
    legacyMigrated = true;
    try {
      const keys = await idbGetAllKeys();
      for (const k of keys) {
        if (typeof k !== 'string') continue;
        const p = parseSnapKey(k);
        if (!p || !p.legacy) continue;
        const newKey = snapKeyFor(p.iso, DEFAULT_SNAP_NAME);
        if (k === newKey) continue;
        const exists = await idbHas(newKey);
        if (!exists) await idbCopy(k, newKey);
        await idbDel(k);
      }
    } catch (e) {
      console.warn('[snap] legacy migration failed:', e);
    }
  }

  // List all known snapshots (post-migration) sorted by iso then name.
  async function listSnapshots() {
    const out = [];
    try {
      const keys = await idbGetAllKeys();
      for (const k of keys) {
        if (typeof k !== 'string') continue;
        const p = parseSnapKey(k);
        if (!p) continue;
        out.push({ iso: p.iso, name: p.name, key: snapKeyFor(p.iso, p.name) });
      }
    } catch (_) {}
    out.sort((a, b) => a.iso.localeCompare(b.iso) || a.name.localeCompare(b.name));
    return out;
  }

  // Re-populate the <select id="snap"> dropdown. If `preferKey` is provided
  // and exists in the new options, that option is selected; otherwise we
  // restore the previously persisted selection or fall back to a sensible
  // default. Called on init, after save/clear/clone/rename.
  async function populateSnapSelect(preferKey) {
    await migrateLegacySnapshots();
    const snaps = await listSnapshots();
    const groupedByIso = new Map();
    for (const s of snaps) {
      if (!groupedByIso.has(s.iso)) groupedByIso.set(s.iso, []);
      groupedByIso.get(s.iso).push(s);
    }
    // Build option list: for each ISO in catalog, a fresh-boot entry, then
    // its snapshots. Then any "orphan" snapshots whose ISO is not in the
    // catalog (rare, but we still surface them so the user can boot/rename).
    const seenIsos = new Set();
    const opts = [];
    for (const cat of ISO_CATALOG) {
      seenIsos.add(cat.iso);
      opts.push({ value: 'fresh:' + cat.iso, label: '★ fresh boot — ' + cat.label });
      const list = groupedByIso.get(cat.iso) || [];
      for (const s of list) opts.push({ value: s.key, label: '  ' + cat.iso + '  /  ' + s.name });
    }
    for (const [iso, list] of groupedByIso) {
      if (seenIsos.has(iso)) continue;
      opts.push({ value: 'fresh:' + iso, label: '★ fresh boot — ' + iso });
      for (const s of list) opts.push({ value: s.key, label: '  ' + iso + '  /  ' + s.name });
    }
    snapEl.innerHTML = '';
    for (const o of opts) {
      const el = document.createElement('option');
      el.value = o.value; el.textContent = o.label;
      snapEl.appendChild(el);
    }
    // Resolve desired selection
    const stored = (() => { try { return localStorage.getItem(SEL_LS_KEY) || ''; } catch (_) { return ''; } })();
    const candidates = [
      preferKey,
      stored,
      // First snapshot for default ISO, else fresh-boot of default ISO
      (() => {
        const list = groupedByIso.get(initialFreshIso) || [];
        return list.length ? list[0].key : ('fresh:' + initialFreshIso);
      })(),
      'fresh:' + DEFAULT_ISO,
    ];
    for (const c of candidates) {
      if (c && [...snapEl.options].some(o => o.value === c)) {
        snapEl.value = c; break;
      }
    }
    persistSelection();
    updateSnapButtonsState();
  }
  function persistSelection() {
    try { localStorage.setItem(SEL_LS_KEY, snapEl.value); } catch (_) {}
  }
  function updateSnapButtonsState() {
    const sel = parseSel(snapEl.value);
    const running = !!emulator;
    const isSnap = !!(sel && !sel.isFresh);
    // rename/clone/clear require an actual saved snapshot in the selection.
    if (renameBtn) renameBtn.disabled = !isSnap;
    if (cloneBtn)  cloneBtn.disabled  = !isSnap;
    // restore/clear: only meaningful when a snapshot is selected.
    // (When emulator is running, restore is still allowed — it triggers
    // a shutdown+reboot path via doRestore().)
    restoreBtn.disabled = !isSnap;
    clearBtn.disabled   = !isSnap;
    // save: always allowed while emulator running. From a fresh-boot
    // selection, save creates the "default" snapshot for that ISO.
    saveBtn.disabled = !running;
  }

  // ---- Auto-save: debounced snapshot after activity settles ----
  // Live ISOs write to tmpfs, so the only way to "persist FS changes" is
  // to snapshot full VM state. We debounce ~3s of quiet after any serial
  // activity or user input, then save_state() → IDB. Functionally
  // "persists on change" without manual save-button clicks.
  const AUTOSAVE_IDLE_MS = 3000;
  const AUTOSAVE_MIN_GAP_MS = 5000; // never save more than once per 5s
  let autosaveTimer = null, autosaveInFlight = false, lastAutosaveAt = 0, dirty = false;

  function markDirty() {
    // Suppress while a save is in flight: the umount/remount handshake
    // itself sends serial bytes via sendGuestText, which would otherwise
    // re-dirty the snapshot and immediately re-trigger autosave.
    if (saveInProgress) return;
    dirty = true;
    if (!autosaveEl.checked) return;
    // Refuse to autosave huge VMs: would block the tab for tens of seconds
    // and possibly blow the IDB origin quota. Disable the toggle once and
    // tell the user how to persist manually.
    if (currentMemMB && currentMemMB > AUTOSAVE_MEM_LIMIT_MB) {
      autosaveEl.checked = false;
      try { localStorage.setItem('v86.autosave', '0'); } catch (_) {}
      setStatus(
        `auto-save disabled: VM has ${currentMemMB} MB RAM — a snapshot would be ~${currentMemMB} MB and freeze the tab. Use the manual "save" button when you want to persist.`,
        'err'
      );
      console.warn(`[autosave] disabled — memMB=${currentMemMB} > limit=${AUTOSAVE_MEM_LIMIT_MB}`);
      return;
    }
    scheduleAutosave();
  }
  function scheduleAutosave() {
    if (!emulator || autosaveInFlight) return;
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(runAutosave, AUTOSAVE_IDLE_MS);
  }
  async function runAutosave() {
    if (!emulator || autosaveInFlight || !dirty) return;
    const since = Date.now() - lastAutosaveAt;
    if (since < AUTOSAVE_MIN_GAP_MS) {
      autosaveTimer = setTimeout(runAutosave, AUTOSAVE_MIN_GAP_MS - since);
      return;
    }
    autosaveInFlight = true;
    saveInProgress = true;
    const prevStatus = statusEl.textContent;
    try {
      const t0 = Date.now();
      // Take snapshot in unmounted state — see umountBeforeSave() comment.
      await umountBeforeSave();
      const st = await emulator.save_state();
      // Auto-save always writes back into whatever snapshot is currently
      // active. If the session started from a fresh-boot selection, we
      // synthesize the "default" name (and surface it in the dropdown on
      // next populate).
      const name = currentSnapName || DEFAULT_SNAP_NAME;
      await idbPut(snapKeyFor(currentIso, name), st);
      currentSnapName = name;
      // Restore mount for the live session so the user keeps working.
      await remountAfterSave();
      lastAutosaveAt = Date.now();
      dirty = false;
      // The autosave just materialized a snapshot under currentIso/currentSnapName.
      // Refresh dropdown so a new fresh-boot session gets a real entry.
      try { await populateSnapSelect(snapKeyFor(currentIso, currentSnapName)); } catch (_) {}
      setStatus(`auto-saved ${(st.byteLength/1048576).toFixed(1)} MB (${lastAutosaveAt - t0} ms)`, 'ok');
      // restore prior status after 2s (unless user changed it)
      setTimeout(() => { if (statusEl.textContent.startsWith('auto-saved')) setStatus(prevStatus); }, 2000);
    } catch (e) {
      setStatus('auto-save failed: ' + e.message, 'err');
    } finally { autosaveInFlight = false; saveInProgress = false; }
  }

  // ---- Emulator lifecycle ----
  let emulator = null, currentIso = null, currentSnapName = null, currentMemMB = 0;

  // Auto-save serializes the FULL guest RAM (memory_size bytes) plus device
  // state into a single Uint8Array, then writes it to IndexedDB. For Alpine
  // at the default 2048 MB that's a ~2 GB blob — save_state() blocks the JS
  // main thread for tens of seconds and the IDB write structured-clones
  // another 2 GB on top. The tab looks frozen the whole time, and large
  // installs (npm install -g openclaw) trigger this exactly when the user
  // tries to interact with the just-finished prompt.
  // Above this threshold we refuse to autosave and tell the user to use
  // the manual save button instead.
  const AUTOSAVE_MEM_LIMIT_MB = 1024;

  // ── SerialVfs ───────────────────────────────────────────────────────────
  // JS↔guest filesystem bridge over serial0 — bypasses 9P entirely.
  //
  // Each command runs at the guest shell as:
  //
  //     printf '\n%s\n' "$__b"; { <user cmd>; } </dev/null; ec=$?
  //     printf '\n%s:%d\n' "$__e" "$ec"
  //
  // where $__b / $__e are randomized markers. We never emit the marker text
  // as a literal string in the sent command, so the shell's input echo (which
  // mirrors typed bytes back over serial0) cannot confuse output detection —
  // the markers only appear in the *output* stream, never in the echo.
  //
  // API surface:
  //   exec(cmd, opts?)  → { stdout, exitCode, timedOut? }
  //   ls(path)          → string[]   (one entry per line, hidden+visible)
  //   cat(path)         → string|null
  //   read(path)        → Uint8Array|null (binary-safe via base64)
  //   write(path,data)  → { exitCode } (string or Uint8Array; auto-mkdir)
  //   stat(path)        → { type, size, mode, uid, gid, mtime } | null
  //   mkdir(path)       → exec result
  //   rm(path)          → exec result (rm -rf)
  //   pwd()             → string
  //
  // All calls are queued; one command runs at a time. Calls before the
  // shell is ready queue up and drain after `markShellReady()`.
  class SerialVfs {
    constructor() {
      this.queue = [];
      this.busy = false;
      this.ready = false;
      this.attached = false;
      this.buf = '';                    // rolling output capture
      this.current = null;              // active job
      this.maxBufWindow = 4096;         // bytes to keep waiting for marker boundary
      this.echoMaxLen = 65536;          // shell echo buffer cap
    }

    _attach(em) {
      if (this.attached) return;
      this.attached = true;
      em.add_listener('serial0-output-byte', (b) => this._onByte(b));
    }

    setReady(yes) {
      this.ready = !!yes;
      if (this.ready && !this.busy && this.queue.length) this._next();
    }

    _send(text) {
      const s = String(text || '');
      for (let i = 0; i < s.length; i++) emulator.serial0_send(s[i]);
    }

    _onByte(b) {
      if (!this.current) return;
      const c = this.current;
      this.buf += String.fromCharCode(b);
      if (this.buf.length > this.echoMaxLen) {
        this.buf = this.buf.slice(-this.echoMaxLen);
      }
      if (!c.started) {
        // Begin marker only ever appears in output as `\n${begin}\r?\n`
        // (printf prefixes with explicit \n). The echoed source line embeds
        // begin inside double quotes/variable substitution and never on a
        // line of its own.
        const m = this.buf.match(c.beginRe);
        if (!m) return;
        c.started = true;
        this.buf = this.buf.slice(m.index + m[0].length);
        c.output = '';
      }
      const m = this.buf.match(c.endRe);
      if (m) {
        c.output += this.buf.slice(0, m.index);
        const exitCode = parseInt(m[1], 10);
        this.buf = '';
        this.current = null;
        const job = c.job;
        clearTimeout(c.timer);
        job.resolve({ stdout: c.output, exitCode });
        this._next();
      } else {
        // Flush bytes that can't possibly be part of a marker yet.
        const keep = Math.min(this.buf.length, this.maxBufWindow);
        if (this.buf.length > keep) {
          c.output += this.buf.slice(0, this.buf.length - keep);
          this.buf = this.buf.slice(-keep);
        }
      }
    }

    _next() {
      if (!this.ready) { this.busy = false; return; }
      const job = this.queue.shift();
      if (!job) { this.busy = false; return; }
      this.busy = true;
      this._run(job);
    }

    _run(job) {
      const tag = Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      // Markers are constructed at runtime from a shell var so the literal
      // `__VFS_B_<tag>__` text never appears in the sent command line (and
      // therefore never appears in the input echo).
      const begin = '__VFSB_' + tag + '__';
      const end   = '__VFSE_' + tag + '__';
      this.current = {
        job,
        started: false,
        output: '',
        beginRe: new RegExp('\\n' + begin + '\\r?\\n'),
        endRe:   new RegExp('\\n' + end + ':(-?\\d+)\\r?\\n'),
        timer: null,
      };
      this.buf = '';
      // Build the printf format strings at runtime via concatenation so the
      // marker text is not present as a single literal token in the source.
      // Note: `</dev/null` prevents the user's command from reading marker
      // bytes off stdin (serial0 input is the same pipe).
      const wrapped =
        `__b='${begin}'; __e='${end}'; ` +
        `printf '\\n%s\\n' "$__b"; { ${job.cmd}\n} </dev/null; __ec=$?; ` +
        `printf '\\n%s:%d\\n' "$__e" "$__ec"\n`;
      this._send(wrapped);
      this.current.timer = setTimeout(() => {
        if (!this.current || this.current.job !== job) return;
        const cur = this.current;
        this.current = null;
        this.buf = '';
        // Best-effort: send Ctrl-C to break the runaway command.
        this._send('\x03');
        job.resolve({ stdout: cur.output, exitCode: -1, timedOut: true });
        this._next();
      }, job.timeout || 30000);
    }

    exec(cmd, opts = {}) {
      return new Promise((resolve) => {
        this.queue.push({ cmd: String(cmd), resolve, timeout: opts.timeout });
        if (this.ready && !this.busy) this._next();
      });
    }

    static _q(s) { return "'" + String(s).replace(/'/g, "'\\''") + "'"; }
    static _dirname(p) { const i = String(p).lastIndexOf('/'); return i <= 0 ? '/' : p.slice(0, i); }

    async ls(path = '.') {
      const r = await this.exec(`ls -1A -- ${SerialVfs._q(path)} 2>/dev/null`);
      if (r.exitCode !== 0) return [];
      return r.stdout.split('\n').map(s => s.replace(/\r$/, '')).filter(Boolean);
    }

    async cat(path) {
      const r = await this.exec(`cat -- ${SerialVfs._q(path)} 2>/dev/null`);
      return r.exitCode === 0 ? r.stdout : null;
    }

    async read(path) {
      const r = await this.exec(`base64 -- ${SerialVfs._q(path)} 2>/dev/null`, { timeout: 60000 });
      if (r.exitCode !== 0) return null;
      const b64 = r.stdout.replace(/[^A-Za-z0-9+/=]/g, '');
      let bin;
      try { bin = atob(b64); } catch { return null; }
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async write(path, data) {
      let bytes;
      const tag = Object.prototype.toString.call(data);
      if (typeof data === 'string') bytes = new TextEncoder().encode(data);
      else if (tag === '[object Uint8Array]') bytes = new Uint8Array(data.buffer, data.byteOffset, data.byteLength);
      else if (data instanceof Uint8Array) bytes = data;
      else if (data && data.buffer instanceof ArrayBuffer) bytes = new Uint8Array(data.buffer, data.byteOffset || 0, data.byteLength);
      else throw new Error('SerialVfs.write: data must be string or Uint8Array');

      // Encode to base64 in JS (binary-safe), then stream to a temp file in
      // <=4KiB chunks via `printf >>` and decode with base64 -d. Works on
      // BusyBox without `cat << EOF` heredoc fragility.
      let bstr = '';
      for (let i = 0; i < bytes.length; i++) bstr += String.fromCharCode(bytes[i]);
      const b64 = btoa(bstr);

      const tmp = '/tmp/.svfsw.' + Math.random().toString(36).slice(2, 10);
      const CHUNK = 4096;
      const dir = SerialVfs._dirname(path);
      let cmd = `: > ${SerialVfs._q(tmp)} || exit 1; `;
      for (let i = 0; i < b64.length; i += CHUNK) {
        cmd += `printf '%s' ${SerialVfs._q(b64.slice(i, i + CHUNK))} >> ${SerialVfs._q(tmp)}; `;
      }
      cmd += `mkdir -p -- ${SerialVfs._q(dir)} 2>/dev/null; `;
      cmd += `base64 -d ${SerialVfs._q(tmp)} > ${SerialVfs._q(path)}; rc=$?; `;
      cmd += `rm -f ${SerialVfs._q(tmp)}; exit $rc`;
      return this.exec(cmd, { timeout: Math.max(60000, 1000 + bytes.length / 1024 * 200) });
    }

    mkdir(path)      { return this.exec(`mkdir -p -- ${SerialVfs._q(path)}`); }
    rm(path)         { return this.exec(`rm -rf -- ${SerialVfs._q(path)}`); }

    async stat(path) {
      const r = await this.exec(`stat -c '%F|%s|%a|%u|%g|%Y' -- ${SerialVfs._q(path)} 2>/dev/null`);
      if (r.exitCode !== 0) return null;
      const parts = r.stdout.trim().split('|');
      if (parts.length < 6) return null;
      return {
        type:  parts[0],
        size:  +parts[1],
        mode:  parts[2],
        uid:   +parts[3],
        gid:   +parts[4],
        mtime: +parts[5],
      };
    }

    async pwd() {
      const r = await this.exec('pwd');
      return r.stdout.trim();
    }
  }

  const serialVfs = new SerialVfs();
  window.serialVfs = serialVfs;

  // ── One-shot serial markers ────────────────────────────────────────────
  // Some host operations need to wait for a guest-emitted line (e.g.
  // __UMOUNT_OK__:<nonce> before save_state). Callers register a
  // matcher via awaitGuestMarker(prefix, timeoutMs) and resolve when
  // handleHostMarker sees a line with that prefix. The fundamental
  // value of this pattern: lets us round-trip async work through the
  // guest shell over the same serial path that everything else uses,
  // unaffected by 9P client cache state.
  const oneShotMarkers = []; // [{ re, resolve, reject, timer }]
  function awaitGuestMarker(re, timeoutMs) {
    return new Promise((resolve, reject) => {
      const entry = { re, resolve, reject };
      entry.timer = setTimeout(() => {
        const i = oneShotMarkers.indexOf(entry);
        if (i >= 0) oneShotMarkers.splice(i, 1);
        reject(new Error('marker timeout: ' + re));
      }, timeoutMs);
      oneShotMarkers.push(entry);
    });
  }
  function consumeOneShotMarker(line) {
    for (let i = 0; i < oneShotMarkers.length; i++) {
      const m = line.match(oneShotMarkers[i].re);
      if (m) {
        const e = oneShotMarkers[i];
        oneShotMarkers.splice(i, 1);
        clearTimeout(e.timer);
        e.resolve(m);
        return true;
      }
    }
    return false;
  }

  function sendGuestText(text) {
    if (!emulator) return false;
    const value = String(text || '');
    for (let index = 0; index < value.length; index++) emulator.serial0_send(value[index]);
    markDirty();
    return true;
  }

  // ── Umount-before-save handshake ────────────────────────────────────────
  // The 9P kernel client tracks chan->inuse in guest RAM. If we save_state()
  // while /mnt/host is mounted, the snapshot RAM image holds a stale
  // chan->inuse=1 referencing a virtqueue identity that won't match the
  // freshly recreated Virtio9p instance on restore. Result: post-restore
  // `mount -t 9p` fails with `9pnet_virtio: no channels available`.
  //
  // The fix: always snapshot in the unmounted state. Before save we
  // umount /mnt/host (kernel calls p9_client_destroy → chan->inuse=0).
  // After save we re-mount so the live session keeps working. On restore
  // the guest's restoreNetCmd already runs `mount -t 9p`, which now
  // succeeds cleanly because the snapshot captured "no mount" state.
  let saveInProgress = false; // guard markDirty re-entrance during save
  async function umountBeforeSave() {
    if (!emulator || !shellReady) return false;
    const tag = 'usv' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    // Anchor to start-of-line: avoid matching the echoed command line
    // (which contains the literal printf invocation as a substring).
    const re = new RegExp('^__UMOUNT_OK__:' + tag + '\\b');
    const wait = awaitGuestMarker(re, 4000);
    sendGuestText(
      "sync; " +
      "umount -f /mnt/host 2>/dev/null; " +
      "umount -l /mnt/host 2>/dev/null; " +
      "sync; " +
      "printf '__UMOUNT_OK__:" + tag + "\\n'\n"
    );
    try { await wait; return true; } catch (_) { return false; }
  }
  async function remountAfterSave() {
    if (!emulator || !shellReady) return false;
    const tag = 'rsv' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const re = new RegExp('^__REMOUNT_OK__:' + tag + '\\b');
    const wait = awaitGuestMarker(re, 4000);
    sendGuestText(
      "mount -t 9p -o trans=virtio,version=9p2000.L,msize=8192,cache=none,access=any," +
      "dfltuid=0,dfltgid=0,uid=0,gid=0,rw host9p /mnt/host 2>/dev/null; " +
      "printf '__REMOUNT_OK__:" + tag + "\\n'\n"
    );
    try { await wait; return true; } catch (_) { return false; }
  }

  const sendCmd = sendGuestText;

  function flushPendingGuestCommands() {
    if (!emulator || !shellReady || !pendingGuestCommands.length || flushingGuestCommands) return;
    flushingGuestCommands = true;
    const flushNext = () => {
      if (!emulator || !shellReady || !pendingGuestCommands.length) {
        flushingGuestCommands = false;
        return;
      }
      const entry = pendingGuestCommands.shift();
      sendGuestText(entry.text);
      if (entry.label) sLog('guest: ' + entry.label + ' (running in terminal below)', 'ok');
      if (typeof entry.afterRun === 'function') {
        const delayMs = entry.afterDelayMs == null ? 1200 : entry.afterDelayMs;
        setTimeout(() => {
          entry.afterRun().catch(() => {});
        }, delayMs);
      }
      setTimeout(flushNext, 140);
    };
    flushNext();
  }

  function dispatchGuestCommand(text, label, options = {}) {
    if (!emulator) return false;
    const payload = String(text || '').replace(/\s+$/, '') + '\n';
    if (!shellReady) {
      pendingGuestCommands.push({
        text: payload,
        label,
        afterRun: options.afterRun,
        afterDelayMs: options.afterDelayMs,
      });
      if (label) sLog('guest: ' + label + ' (queued until shell is ready)', 'hint');
      return true;
    }
    sendGuestText(payload);
    if (label) sLog('guest: ' + label + ' (running in terminal below)', 'ok');
    if (typeof options.afterRun === 'function') {
      const delayMs = options.afterDelayMs == null ? 1200 : options.afterDelayMs;
      setTimeout(() => {
        options.afterRun().catch(() => {});
      }, delayMs);
    }
    return true;
  }

  // ── DNS interceptor (pure-JS UDP/53 → DoH via relay) ──────────────────────
  // v86's built-in DoH reply injection is broken for us. We hook the emulator
  // bus before WISP sees the packet, answer DNS ourselves via /dns-query on
  // the relay, and inject a correctly framed Ethernet reply via net0-receive.
  function installDnsInterceptor(em) {
    const DNS_ENDPOINT = 'https://relay.linuxontab.com/dns-query';

    // Parse minimal fields from an outgoing Ethernet II frame to detect DNS.
    function parseOutgoingDns(buf) {
      if (!(buf instanceof Uint8Array) || buf.length < 14 + 20 + 8) return null;
      const etype = (buf[12] << 8) | buf[13];
      if (etype !== 0x0800) return null;                     // not IPv4
      const ip0 = 14;
      const ihl = (buf[ip0] & 0x0f) * 4;
      if (ihl < 20) return null;
      if (buf[ip0 + 9] !== 17) return null;                  // not UDP
      const udp0 = ip0 + ihl;
      if (udp0 + 8 > buf.length) return null;
      const dport = (buf[udp0 + 2] << 8) | buf[udp0 + 3];
      if (dport !== 53) return null;
      const sport = (buf[udp0] << 8) | buf[udp0 + 1];
      const ulen  = (buf[udp0 + 4] << 8) | buf[udp0 + 5];
      if (ulen < 8 || udp0 + ulen > buf.length) return null;
      return {
        ethDst: buf.slice(0, 6),
        ethSrc: buf.slice(6, 12),
        ipSrc:  buf.slice(ip0 + 12, ip0 + 16),
        ipDst:  buf.slice(ip0 + 16, ip0 + 20),
        udpSport: sport,
        dnsPayload: buf.slice(udp0 + 8, udp0 + ulen),
      };
    }

    function checksum16(bytes, start, end) {
      let sum = 0;
      for (let i = start; i + 1 < end; i += 2) sum += (bytes[i] << 8) | bytes[i + 1];
      if ((end - start) & 1) sum += bytes[end - 1] << 8;
      while (sum >> 16) sum = (sum & 0xffff) + (sum >> 16);
      return (~sum) & 0xffff;
    }

    function buildDnsReply(q, response) {
      const ipLen  = 20 + 8 + response.length;
      const ethLen = 14 + ipLen;
      const out    = new Uint8Array(ethLen);
      out.set(q.ethSrc, 0);                                  // new dst = old src
      out.set(q.ethDst, 6);                                  // new src = old dst
      out[12] = 0x08; out[13] = 0x00;
      const ip = 14;
      out[ip + 0] = 0x45; out[ip + 1] = 0x00;
      out[ip + 2] = (ipLen >> 8) & 0xff; out[ip + 3] = ipLen & 0xff;
      out[ip + 8] = 64; out[ip + 9] = 17;
      out.set(q.ipDst, ip + 12);                             // src = old dst
      out.set(q.ipSrc, ip + 16);                             // dst = old src
      const ipc = checksum16(out, ip, ip + 20);
      out[ip + 10] = (ipc >> 8) & 0xff; out[ip + 11] = ipc & 0xff;
      const udp = ip + 20;
      out[udp + 0] = 0; out[udp + 1] = 53;
      out[udp + 2] = (q.udpSport >> 8) & 0xff; out[udp + 3] = q.udpSport & 0xff;
      const ulen = 8 + response.length;
      out[udp + 4] = (ulen >> 8) & 0xff; out[udp + 5] = ulen & 0xff;
      // UDP checksum is optional for IPv4 — leave as 0.
      out.set(response, udp + 8);
      return out;
    }

    async function handleDnsQuery(q) {
      try {
        const resp = await fetch(DNS_ENDPOINT, {
          method: 'POST',
          headers: { 'content-type': 'application/dns-message' },
          body: q.dnsPayload,
        });
        if (!resp.ok) { console.warn('[dns] upstream status', resp.status); return; }
        const ab = await resp.arrayBuffer();
        const reply = buildDnsReply(q, new Uint8Array(ab));
        em.bus.send('net0-receive', reply);
      } catch (e) {
        console.warn('[dns] fetch failed', e);
      }
    }

    // Hook net0-send. v86's BusConnector stores listeners as an array on
    // `listeners[topic]` and dispatches to all of them. To avoid double-sending
    // non-DNS packets, we REPLACE the array: save v86's existing listener,
    // then install ours as the sole listener (which forwards to v86 for
    // non-DNS packets).
    const tryHook = () => {
      if (!em.bus) return false;
      const l = em.bus.listeners;
      if (!l || !l['net0-send'] || !l['net0-send'].length) return false;
      const prev = l['net0-send'][l['net0-send'].length - 1];
      const hijacker = {
        fn: (data) => {
          const buf = data instanceof ArrayBuffer ? new Uint8Array(data) : data;
          const q = parseOutgoingDns(buf);
          if (q) { handleDnsQuery(q); return; }
          if (prev) prev.fn.call(prev.this_value, data);
        },
        this_value: this,
      };
      l['net0-send'] = [hijacker];
      console.log('[dns] interceptor installed, replaced v86 listener');
      return true;
    };
    // The adapter registers net0-send from its constructor, which runs inside
    // `new V86(cfg)`, so by the time we call installDnsInterceptor() the
    // listener is already there. Retry a few times just in case.
    if (!tryHook()) {
      let tries = 0;
      const iv = setInterval(() => {
        if (tryHook() || ++tries > 20) clearInterval(iv);
      }, 100);
    }
  }

  async function boot(opts = {}) {
    // Resolve target snapshot from the dropdown selection (or opts.snapKey
    // override). Fresh-boot selections become a clean ISO boot; named
    // selections become an idbGet-restore.
    let sel = opts.snapKey ? parseSel(opts.snapKey) : parseSel(snapEl.value);
    if (!sel) sel = parseSel('fresh:' + DEFAULT_ISO);
    const iso = sel.iso;
    currentIso = iso;
    currentSnapName = sel.isFresh ? null : sel.name;
    // doRestore is honored only when the selection is a named snapshot AND
    // the caller asked for restore. Fresh-boot selections always boot clean.
    const snapKey = sel.isFresh ? null : sel.key;
    const doRestore = !!(opts.restore && snapKey && await idbHas(snapKey));

    const labelIso = sel.isFresh ? iso : (iso + ' / ' + sel.name);
    setStatus(doRestore ? `restoring ${labelIso}…` : `booting ${labelIso}…`);
    bootBtn.disabled = true;

    byteCount = 0;
    term.reset();

    // Alpine runs diskless from the ISO — rootfs is tmpfs sized at 50% of RAM
    // by default. 512 MB was tight (rootfs capped at 244 MB, ENOSPC during
    // `npm install -g`, and node/npm got OOM-killed). 1024 MB gave a ~500 MB
    // rootfs but large npm packages (openclaw has 7231 files across dozens of
    // transitive deps) still fill it. 2048 MB gives a ~1 GB rootfs and plenty
    // of process headroom. Tiny busybox ISOs still run on 128.
    // Some browsers/v86 builds fail ISOLINUX boot at >=4096 MB, so we cap
    // Alpine memory at 3584 MB for stability.
    // Override with ?mem=<MB> for debugging.
    const isAlpine = /^alpine/i.test(iso);
    const memOverride = parseInt(new URLSearchParams(location.search).get('mem') || '', 10);
    const maxStableAlpineMemMB = 3584;
    const requestedMemMB = Number.isFinite(memOverride) && memOverride > 0
      ? memOverride
      : (isAlpine ? 2048 : 128);
    const memMB = isAlpine
      ? Math.min(requestedMemMB, maxStableAlpineMemMB)
      : requestedMemMB;
    if (isAlpine && requestedMemMB > maxStableAlpineMemMB) {
      console.warn(`[boot] requested mem=${requestedMemMB}MB exceeds stable cap; using ${memMB}MB`);
      setStatus(`requested ${requestedMemMB}MB; capped to ${memMB}MB for stable boot`);
    }
    const cfg = {
      wasm_path: './v86.wasm',
      bios:     { url: './seabios.bin' },
      vga_bios: { url: './vgabios.bin' },
      cdrom:    { url: './' + iso },
      memory_size: memMB * 1024 * 1024,
      vga_memory_size: 4 * 1024 * 1024,
      autostart: true,
      disable_mouse: true,
      // Empty 9P virtio filesystem. Mounts in the guest as the virtio tag
      // `host9p`. We use it to expose files between guest and host browser:
      // the guest writes to /mnt/host/* and the host reads via
      // emulator.fs9p.read_dir() / read_file() — no relay or websocat
      // needed. The viewer overlay button uses this directly.
      // Skipped in legacy mode so device topology matches v1 snapshots.
      ...(LEGACY_BOOT ? {} : { filesystem: {} }),
    };
    // Network is always enabled (no checkbox). Route emulated NIC through
    // the Fly.io WISP relay so `apk add`, wget, etc. work.
    // Migrate legacy relay URLs to the Fly.io WISP endpoint. The Cloudflare
    // Worker relay (wisps://relay.linuxontab.com/wisp) cannot reach CF-fronted
    // hosts like api.openai.com due to CF's loopback-prevention block on
    // Worker→CF-IP connect(). The Fly.io backend uses tokio::net::TcpStream
    // and has no such restriction.
    // The Fly backend speaks WISP v1, so the URL MUST use wisps:// (secure)
    // or wisp:// — v86's src/browser/network.js picks WispNetworkAdapter only
    // for those schemes. A plain wss:// URL silently falls back to the legacy
    // raw-Ethernet NetworkAdapter, which sends DHCP/ARP frames our WISP server
    // does not understand (guest then never gets a DHCP lease).
    try {
      const stored = localStorage.getItem('v86.relay-url') || '';
      if (stored && (
        /relay\.(traits\.build|linuxontab\.com)\/(x\/sys|x\/net|linux\/tunnel|wisp)\/?$/.test(stored) ||
        /^wisps?:\/\/relay\.(traits\.build|linuxontab\.com)\/wisp\/?$/.test(stored) ||
        /^wss?:\/\/(apptron-traits-build|linuxontab-net)\.fly\.dev\/wisp\/?$/.test(stored)
      )) {
        localStorage.setItem('v86.relay-url', 'wisps://linuxontab-net.fly.dev/wisp');
      }
    } catch(_) {}
    const relayUrl = new URLSearchParams(location.search).get('relay')
      || localStorage.getItem('v86.relay-url')
      || 'wisps://linuxontab-net.fly.dev/wisp';
    // v86 selects the backend from the URL scheme: wisp://, wisps:// →
    // WispNetworkAdapter (TCP tunneling); ws://, wss:// → legacy raw-Ethernet
    // NetworkAdapter; "fetch" → FetchNetworkAdapter. v86 only creates a NIC
    // when net_device.type is set explicitly.
    //
    // What works with the config below:
    //   - NIC bring-up, DHCP lease (192.168.86.100)
    //   - ICMP (ping 1.1.1.1)
    //   - TCP (real sockets via WISP to cloudflare:sockets)
    //   - DNS via DoH proxied through our relay at /dns-query
    cfg.net_device = {
      type: 'ne2k',
      relay_url: relayUrl,
      dns_method: 'doh',
      doh_server: 'relay.linuxontab.com',
      cors_proxy: 'https://relay.linuxontab.com/cors?url=',
    };
    if (doRestore) {
      const blob = await idbGet(snapKey);
      cfg.initial_state = { buffer: blob };
    }

    emulator = new V86(cfg);
    window.emulator = emulator;
    currentMemMB = memMB;
    serialVfs._attach(emulator);

    // ── 9P inode uid/gid sanitizer ──────────────────────────────────────────
    // v86's fs9p stores inode uid as whatever the kernel sent in Tattach's
    // n_uname field. Linux 9p with `access=any` sends ~0u (0xFFFFFFFF) as a
    // sentinel for "any user". v86 stores that as fid.uid, then Tmkdir/Tlcreate
    // copy it into c.uid. When the kernel reads it back via Tgetattr, (uid_t)-1
    // is treated as "invalid" and squashed to dfltuid (65534 = nobody),
    // producing EOVERFLOW on plain `rm`/`stat`. We patched libv86.js Tattach
    // to clamp n_uname to 0 for new attaches, but persisted snapshots still
    // contain stale inodes with uid=4294967295. This walks the inode array
    // on every emulator-ready and resets any out-of-range uid/gid to 0 (root).
    function sanitizeInodeOwnership() {
      const fs = emulator && emulator.fs9p;
      if (!fs || !fs.inodes) return 0;
      let fixed = 0;
      for (const inode of fs.inodes) {
        if (!inode) continue;
        if (inode.uid === undefined || inode.uid < 0 || inode.uid >= 0x80000000 || !Number.isFinite(inode.uid)) {
          inode.uid = 0; fixed++;
        }
        if (inode.gid === undefined || inode.gid < 0 || inode.gid >= 0x80000000 || !Number.isFinite(inode.gid)) {
          inode.gid = 0;
        }
      }
      if (fixed) console.log('[fs9p] sanitized inode uids:', fixed);
      return fixed;
    }
    window.sanitize9pInodes = sanitizeInodeOwnership;

    // ── DNS interceptor ─────────────────────────────────────────────────────
    // v86's WispNetworkAdapter has a built-in DoH path (handle_fake_dns_doh)
    // but its synthesised UDP reply isn't delivered to the guest resolver in
    // the current v86 build. We bypass it entirely: peek at outbound Ethernet
    // frames on the bus, detect UDP/53 queries, fetch DoH through our relay,
    // and inject the reply back onto the receive side with correct framing.
    installDnsInterceptor(emulator);

    // ── virtio-9p post-restore IRQ kick ─────────────────────────────────────
    // After snapshot restore, the kernel's 9pnet_virtio driver still has
    // chan->inuse=true from the snapshot-era mount, while the v86 backend
    // virtqueue has been re-set_state'd with addresses that the kernel may no
    // longer trust. The deepest fix in pure JS is to issue a virtio
    // config-change interrupt (VIRTIO_ISR_DEVICE_CFG, ISR bit 2) so the
    // kernel's virtio_pci core fires its config_changed callback and the
    // 9pnet_virtio driver gets a chance to revalidate. We also bump
    // config_generation so the kernel re-reads the device tag/config space.
    //
    // Caveats: this is speculative. The Linux 9p driver's config_changed
    // path doesn't actively clear chan->inuse, but a config IRQ + generation
    // bump is the only nudge we can deliver from pure JS without patching
    // libv86.js. If this proves insufficient, the backstop is to detect
    // mount failure and auto-clear the snapshot for one-reload recovery.
    function kickVirtio9pAfterRestore() {
      try {
        const dev = emulator && emulator.v86 && emulator.v86.cpu && emulator.v86.cpu.devices && emulator.v86.cpu.devices.virtio_9p;
        if (!dev) { console.warn('[restore] virtio_9p device missing'); return false; }
        const v = dev.virtio;
        if (!v) { console.warn('[restore] virtio_9p.virtio missing'); return false; }
        // Re-bind virtqueue handle in case set_state recreated queues array.
        if (Array.isArray(v.queues) && v.queues.length > 0) dev.virtqueue = v.queues[0];
        if (typeof v.notify_config_changes === 'function') {
          v.notify_config_changes();
          console.log('[restore] virtio_9p notify_config_changes() fired (ISR bit 2)');
        }
        if (typeof v.update_config_generation === 'function') {
          v.update_config_generation();
          console.log('[restore] virtio_9p config_generation bumped');
        }
        return true;
      } catch (e) {
        console.warn('[restore] kickVirtio9pAfterRestore failed:', e);
        return false;
      }
    }
    window.kickVirtio9pAfterRestore = kickVirtio9pAfterRestore;

    emulator.add_listener('emulator-ready',   () => { sanitizeInodeOwnership(); if (doRestore) kickVirtio9pAfterRestore(); setStatus('ready'); });
    emulator.add_listener('emulator-started', () => { sanitizeInodeOwnership(); if (doRestore) kickVirtio9pAfterRestore(); setStatus(doRestore ? 'restored' : 'running', 'ok'); });
    emulator.add_listener('emulator-stopped', () => setStatus('stopped'));

    // ── Restore-path instrumentation ───────────────────────────────────────
    // Visible in browser console. Captures WispNetworkAdapter WS lifecycle so
    // we can see whether the tunnel reattaches cleanly on restore.
    if (doRestore) {
      console.log('[restore] boot invoked restore=true, snapKey=', snapKey);
      // Dump fs9p state shortly after restore so we can tell whether the
      // snapshot actually carried the share contents across or came back
      // empty. If inodes.length is ~3-5 (just /, /dev, /proc-ish), v86's
      // save_state did not persist fs9p — the guest's `ls /mnt/host` will
      // then be empty regardless of how we remount.
      setTimeout(() => {
        try {
          const fs = emulator && emulator.fs9p;
          if (!fs) { console.warn('[restore] fs9p missing'); return; }
          const inodeCount = fs.inodes ? fs.inodes.filter(Boolean).length : -1;
          // GetChildren returns NAMES (not ids), so we resolve them via the
          // parent's direntries Map for child-id → log a single summary.
          let rootEntries = null, publicEntries = null;
          try {
            if (fs.GetChildren) rootEntries = fs.GetChildren(0);
          } catch (_) {}
          try {
            if (fs.SearchPath) {
              const pub = fs.SearchPath('/public');
              if (pub && pub.id >= 0) publicEntries = fs.GetChildren(pub.id);
            }
          } catch (_) {}
          console.log('[restore] fs9p state', {
            inodes: inodeCount,
            root: rootEntries,
            public: publicEntries,
          });
        } catch (e) { console.warn('[restore] fs9p peek failed', e); }
      }, 800);
      // Peek at the adapter's internal WebSocket (v86 stashes it on
      // emulator.network_adapter.wisp_network.wisp_url / websocket).
      setTimeout(() => {
        try {
          const na = emulator.network_adapter;
          const wn = na && (na.wisp_network || na.wisp || null);
          const ws = wn && (wn.websocket || wn.ws || null);
          console.log('[restore] adapter snapshot', {
            adapter: na ? na.constructor && na.constructor.name : null,
            wisp:    wn ? Object.keys(wn) : null,
            ws_state: ws ? ws.readyState : null,
            ws_url:   ws ? ws.url : null,
            relay:    cfg.net_device && cfg.net_device.relay_url,
          });
        } catch (e) { console.warn('[restore] adapter peek failed', e); }
      }, 500);
    }
    // Auto-init network on first shell prompt.
    // Fresh boot: full setup (DHCP + repos + apk upgrade guidance).
    // Snapshot restore: lightweight NIC recovery (DHCP refresh + resolv.conf)
    // to fix stale tunnel/DHCP state after restore.
    // Network is always enabled (the old #net checkbox was removed). Net
    // init runs as soon as the guest reaches a shell prompt.
    let netInited = false;
    // On restore the shell is already up, so enable stty sync immediately.
    if (doRestore) {
      shellReady = true;
      flushPendingGuestCommands();
    }

    // Build the net-init command (fresh boot vs snapshot restore).
    function buildNetInitCmd() {
      const rootfsParam = (new URLSearchParams(location.search).get('rootfs') || '').trim();
      const rootfsSize = rootfsParam || (isAlpine ? '4G' : '');
      const rootfsCmd = rootfsSize
        ? `mount -o remount,size=${rootfsSize} / >/dev/null 2>&1\necho "[rootfs] remounted / as ${rootfsSize}"\n`
        : '';
      // Fresh Alpine live ISO ships with only /media/cdrom/apks as an apk repo
      // and a stale libcrypto that breaks any `apk add nodejs` (EVP_MD_CTX_get_size_ex
      // symbol mismatch). On fresh boot we replace the repo list with the
      // upstream Alpine CDN, refresh the index, and rebase libc/libcrypto so
      // `apk add <pkg>` works immediately. Snapshot restores skip this since
      // the snapshot already has the patched repos.
      // Disable explicitly with ?setup=0.
      const setupParam = (new URLSearchParams(location.search).get('setup') || '').trim();
      const skipSetup = setupParam === '0';
      const setupCmd = skipSetup ? '' :
        'echo "[setup] configuring apk repositories…"\n' +
        'printf "%s\\n" "https://dl-cdn.alpinelinux.org/alpine/latest-stable/main" "https://dl-cdn.alpinelinux.org/alpine/latest-stable/community" > /etc/apk/repositories\n' +
        'echo "[setup] apk update…"\n' +
        'apk update 2>&1 | tail -3\n' +
        'echo "[setup] apk upgrade (rebasing libc/libcrypto)…"\n' +
        'apk upgrade --available 2>&1 | tail -3\n' +
        'echo "[setup] ready — apk add <pkg> works now. snapshot to skip on next boot."\n';
      // Snapshot restore: WISP WebSocket is freshly reconnected (JS adapter
      // is not in the x86 snapshot), and the Wisp router config is known
      // and fixed: guest IP 192.168.86.100/24, gateway 192.168.86.1, router
      // MAC 52:54:00:01:02:03. A backgrounded `udhcpc` detached subshell
      // never completed and left the guest with no IP and no route — so
      // instead we apply deterministic static config in one shot. This is
      // non-blocking (no RTNL wait, no DHCP round-trip), idempotent, and
      // leaves the guest immediately able to open TCP streams through the
      // freshly-registered WispNetworkAdapter. DoH `doh_server` is already
      // handled by the adapter itself (`dns_method: 'doh'`), so resolv.conf
      // here is only a belt-and-braces fallback for glibc/musl name lookup
      // that bypasses the DoH interceptor.
      //
      // CRITICAL: bounce eth0 BEFORE configuring IP. The WispNetworkAdapter
      // learns the guest NIC's MAC via a `net0-mac` bus event that ne2k
      // fires on driver init. On snapshot restore the ne2k driver is
      // already loaded (x86 state) and does NOT re-emit `net0-mac`, so
      // the fresh adapter keeps a stale/zero vm_mac and silently drops
      // frames. `ip link down/up` re-initializes the NE2K, re-fires the
      // MAC announcement, and resets the adapter's RX/TX ring state.
      // Without this bounce even `ping 192.168.86.1` (virtual gateway)
      // fails 100% post-restore.
      // Retry loop for the eth0 up: empirically, the first `ip link set eth0
      // up` after snapshot restore sometimes silently fails (interface stays
      // DOWN) because the NE2K driver + fresh WispNetworkAdapter handshake
      // is racy. A second `up` after a longer settle always succeeds. We
      // poll `/sys/class/net/eth0/operstate` up to 5 times and redo the up
      // until it reports non-`down`.
      // Mount the v86 9P share at /mnt/host so the host browser viewer can
      // read files written by the guest without going through the relay.
      // - cache=none: forces the kernel to re-fetch stat for every op.
      //   `cache=loose` (the v86 default we used to ship) caches qid.version
      //   and stat fields in the kernel dentry. v86 increments qid.version on
      //   every write/rename/unlink and stores 64-bit size/mtime as JS Numbers,
      //   which over a long session drift past 32-bit limits. The kernel's
      //   p9_check_errors() then returns EOVERFLOW ("Value too large for data
      //   type") on lstat() — which `rm` calls before unlinkat() — so even
      //   `rm -rf /mnt/host/foo` fails. `cache=none` makes 9P slower but
      //   correct: no stale dentries, no overflow on stat, rm/mv/cp work.
      // - msize=8192: small but reliable; v86 9P doesn't like big msize.
      // - access=any: avoid strict per-uid server-side permission checks.
      //   We also drop dfltuid/dfltgid (v86 ignores them anyway).
      // - seed social dirs as 0777 so first-write works even if uid metadata
      //   is reported as overflow/nobody by the 9P bridge on fresh tabs.
      // - always remount: snapshot restore can keep stale old mount options.
      // The symlink puts a `~/host` shortcut in $HOME for ergonomic access.
      // For destructive ops that still trip 9P (legacy snapshots etc), the
      // browser exposes window.wipe9p(path) which deletes via emulator.fs9p
      // directly — no kernel 9P client involved.
      const mount9pCmd =
        'mkdir -p /mnt/host 2>/dev/null\n' +
        // Unstack any existing host9p mounts. If snapshot restore or a prior
        // boot path mounted /mnt/host more than once, a single umount leaves
        // the inner mount(s) stacked underneath — `ls /mnt/host/x` (absolute)
        // and `cd /mnt/host; ls x` (relative) then resolve through different
        // mount layers and disagree (e.g. SFTP writes visible only via the
        // top mount). Loop until /proc/mounts no longer lists host9p.
        'cd / 2>/dev/null\n' +
        'i=0; while grep -q " /mnt/host " /proc/mounts && [ $i -lt 8 ]; do ' +
        '  umount /mnt/host 2>/dev/null || umount -l /mnt/host 2>/dev/null || break; ' +
        '  i=$((i+1)); ' +
        'done\n' +
        'mount -t 9p -o trans=virtio,version=9p2000.L,msize=8192,cache=none,access=any,dfltuid=0,dfltgid=0,uid=0,gid=0,rw host9p /mnt/host 2>/dev/null || ' +
        'mount -t 9p -o trans=virtio,version=9p2000.L,msize=8192,cache=loose,access=any,dfltuid=0,dfltgid=0,uid=0,gid=0,rw host9p /mnt/host 2>/dev/null\n' +
        // Reset stale ownership left over from old snapshots where v86 fs9p
        // recorded uid=0xFFFFFFFF (Linux: nobody=65534, → EOVERFLOW on stat).
        // The host page also runs window.sanitize9pInodes() on emulator-ready
        // for the same purpose; this guest-side chown is belt-and-suspenders
        // for the moment after mount, before the first user `rm`.
        'chown -R 0:0 /mnt/host 2>/dev/null || true\n' +
        'ln -sfn /mnt/host /home/root/host 2>/dev/null\n' +
        'umask 000\n' +
        'mkdir -p -m 0777 /mnt/host/public /mnt/host/public/.following 2>/dev/null\n' +
        'mkdir -p -m 0777 /mnt/host/following /mnt/host/following_new /mnt/host/social_following 2>/dev/null\n' +
        'mkdir -p -m 0777 /mnt/host/vfs/public /mnt/host/vfs/public/.following 2>/dev/null\n' +
        'mkdir -p -m 0777 /mnt/host/vfs/following /mnt/host/vfs/following_new /mnt/host/vfs/social_following 2>/dev/null\n' +
        'chmod 0777 /mnt/host/public /mnt/host/following /mnt/host/following_new /mnt/host/social_following 2>/dev/null || true\n' +
        'chmod 0777 /mnt/host/vfs/public /mnt/host/vfs/following /mnt/host/vfs/following_new /mnt/host/vfs/social_following 2>/dev/null || true\n' +
        // sync9p: ask the host page to refresh its 9P view of /mnt/host
        // and confirm via a receipt the guest reads back. Flow:
        //   1. `sync` flushes guest writes to fs9p.
        //   2. Guest emits "__HOST_SYNC__:<nonce>" on serial0 and blocks
        //      in `read -t` on its own stdin.
        //   3. Host catches marker, refreshes viewer (renderTree),
        //      writes /.tb-sync-<nonce> to fs9p (best-effort, for
        //      observability), and echoes "SYNC9P_RECEIPT:<nonce>\n"
        //      back over serial0.
        //   4. Guest's `read` returns with the receipt line; sync9p prints
        //      "sync9p: ok <nonce>".
        //
        // The previous design polled /mnt/host/.tb-sync-<nonce> from the
        // guest, but the Linux 9P client's dentry + readdir caches can
        // survive snapshot restore in stale states that hide host-written
        // files even from per-nonce stat() probes. Serial is the same
        // bidirectional path the shell already uses, so it cannot be
        // poisoned by 9P client-side caching.
        'cat > /etc/profile.d/02sync9p.sh <<\\__SYNC9P_EOF__\n' +
        'SYNC9P_VERSION="v6-remount-instrumented"\n' +
        'sync9p() {\n' +
        '  __n=$$-$(date +%s 2>/dev/null)-$RANDOM-$RANDOM\n' +
        '  __v="${SYNC9P_VERSION:-unset}"\n' +
        '  sync 2>/dev/null\n' +
        '  printf "sync9p[%s]: nonce=%s\\n" "$__v" "$__n"\n' +
        '  printf "__HOST_SYNC__:%s\\n" "$__n"\n' +
        '  # Wait for host to echo SYNC9P_RECEIPT:<nonce> back over serial.\n' +
        '  __i=0\n' +
        '  while [ $__i -lt 30 ]; do\n' +
        '    if IFS= read -r -t 1 __line 2>/dev/null; then\n' +
        '      case "$__line" in\n' +
        '        *SYNC9P_RECEIPT:$__n*)\n' +
        '          printf "sync9p: receipt matched after %ds\\n" "$__i"\n' +
        '          # 1. drop VFS caches (cheap, may help dentry negative cache)\n' +
        '          if echo 3 > /proc/sys/vm/drop_caches 2>/dev/null; then\n' +
        '            printf "sync9p: drop_caches ok\\n"\n' +
        '          else\n' +
        '            printf "sync9p: drop_caches FAILED\\n"\n' +
        '          fi\n' +
        '          # 2. save cwd, escape if under /mnt/host\n' +
        '          __cwd=$(pwd 2>/dev/null)\n' +
        '          printf "sync9p: cwd=%s\\n" "$__cwd"\n' +
        '          case "$__cwd" in /mnt/host*) cd / 2>/dev/null && printf "sync9p: cd / (was under /mnt/host)\\n" ;; esac\n' +
        '          # 3. show current mount\n' +
        '          printf "sync9p: pre-mounts: "; grep " /mnt/host " /proc/mounts || printf "(none)\\n"\n' +
        '          # 4. umount loop\n' +
        '          __ri=0\n' +
        '          while grep -q " /mnt/host " /proc/mounts && [ $__ri -lt 8 ]; do\n' +
        '            if umount /mnt/host 2>/dev/null; then\n' +
        '              printf "sync9p: umount #%d ok\\n" "$__ri"\n' +
        '            elif umount -l /mnt/host 2>/dev/null; then\n' +
        '              printf "sync9p: umount -l #%d ok\\n" "$__ri"\n' +
        '            else\n' +
        '              printf "sync9p: umount #%d FAILED — break\\n" "$__ri"\n' +
        '              break\n' +
        '            fi\n' +
        '            __ri=$((__ri+1))\n' +
        '          done\n' +
        '          printf "sync9p: post-umount: "; grep " /mnt/host " /proc/mounts || printf "(unmounted)\\n"\n' +
        '          # 5. remount\n' +
        '          if mount -t 9p -o trans=virtio,version=9p2000.L,msize=8192,cache=none,access=any,dfltuid=0,dfltgid=0,uid=0,gid=0,rw host9p /mnt/host 2>/dev/null; then\n' +
        '            printf "sync9p: remount ok (cache=none)\\n"\n' +
        '          elif mount -t 9p -o trans=virtio,version=9p2000.L,msize=8192,cache=loose,access=any,dfltuid=0,dfltgid=0,uid=0,gid=0,rw host9p /mnt/host 2>/dev/null; then\n' +
        '            printf "sync9p: remount ok (cache=loose fallback)\\n"\n' +
        '          else\n' +
        '            printf "sync9p: remount FAILED\\n"\n' +
        '          fi\n' +
        '          printf "sync9p: post-mounts: "; grep " /mnt/host " /proc/mounts || printf "(none)\\n"\n' +
        '          # 6. peek root listing for reality check\n' +
        '          printf "sync9p: ls /mnt/host: "\n' +
        '          ls -1 /mnt/host 2>/dev/null | tr "\\n" " "\n' +
        '          printf "\\n"\n' +
        '          # 7. restore cwd\n' +
        '          case "$__cwd" in /mnt/host*) cd "$__cwd" 2>/dev/null || cd / ;; esac\n' +
        '          printf "sync9p: ok %s\\n" "$__n"\n' +
        '          return 0\n' +
        '          ;;\n' +
        '      esac\n' +
        '    fi\n' +
        '    __i=$((__i+1))\n' +
        '  done\n' +
        '  printf "sync9p: timeout (no receipt for %s)\\n" "$__n" >&2\n' +
        '  return 1\n' +
        '}\n' +
        '__SYNC9P_EOF__\n' +
        '. /etc/profile.d/02sync9p.sh 2>/dev/null || true\n' +
        // ----------------------------------------------------------------
        // Node TUI workarounds. Several common Node CLIs (anything using
        // @clack/prompts, ink, listr2, …) crash with
        //   TypeError [ERR_INVALID_ARG_VALUE]: Received NaN
        // because clack passes a non-TTY writable wrapper as readline's
        // `output`, which leaves `rl.columns === 0`, and `_refreshLine`
        // computes `pos % 0 → NaN`. The fix is to override `.columns` on
        // every readline.Interface to fall back to process.stdout.columns.
        // We also export TERM=xterm-256color (default Alpine getty leaves
        // TERM=vt100, which lacks altscreen and breaks fzf/openclaw/etc).
        // ----------------------------------------------------------------
        'cat > /etc/node-rlfix.cjs <<\\__NODE_RLFIX_EOF__\n' +
        '// LinuxOnTab Node TUI fix — see /etc/profile.d/03nodefix.sh\n' +
        '// 1) Force process.stdout.{columns,rows} to non-zero. v86 serial\n' +
        '//    can briefly report rows=0 between snapshot restore and the\n' +
        '//    first xterm onResize stty push; clack/ink/listr2 then divide\n' +
        '//    by zero and render NaN/Infinity (blank screen, no echo).\n' +
        '//    We override the getters at the prototype level so every\n' +
        '//    tty.WriteStream — including the wrapped streams clack hands\n' +
        '//    to readline — sees sane numbers.\n' +
        'try {\n' +
        '  const tty = require("tty");\n' +
        '  for (const key of ["columns", "rows"]) {\n' +
        '    const proto = tty.WriteStream && tty.WriteStream.prototype;\n' +
        '    if (!proto) break;\n' +
        '    const orig = Object.getOwnPropertyDescriptor(proto, key);\n' +
        '    const stash = "__rlfix_" + key;\n' +
        '    Object.defineProperty(proto, key, {\n' +
        '      configurable: true,\n' +
        '      get() {\n' +
        '        let v = this[stash];\n' +
        '        if (v == null && orig && orig.get) {\n' +
        '          try { v = orig.get.call(this); } catch (_) {}\n' +
        '        }\n' +
        '        if (!v || !Number.isFinite(v)) {\n' +
        '          if (key === "columns") v = parseInt(process.env.COLUMNS, 10) || 120;\n' +
        '          else                    v = parseInt(process.env.LINES,   10) || 40;\n' +
        '        }\n' +
        '        return v;\n' +
        '      },\n' +
        '      set(v) {\n' +
        '        if (orig && orig.set) { try { orig.set.call(this, v); return; } catch (_) {} }\n' +
        '        this[stash] = v;\n' +
        '      },\n' +
        '    });\n' +
        '  }\n' +
        '} catch (_) {}\n' +
        '// 2) Override readline.Interface.columns the same way (clack passes\n' +
        '//    a non-TTY wrapped output, so the prototype patch above does\n' +
        '//    not reach it).\n' +
        'try {\n' +
        '  const rl = require("readline");\n' +
        '  const orig = rl.createInterface;\n' +
        '  rl.createInterface = function(...args) {\n' +
        '    const i = orig.apply(this, args);\n' +
        '    try {\n' +
        '      Object.defineProperty(i, "columns", {\n' +
        '        configurable: true,\n' +
        '        get() { return process.stdout.columns || 120; },\n' +
        '      });\n' +
        '    } catch (_) {}\n' +
        '    return i;\n' +
        '  };\n' +
        '} catch (_) {}\n' +
        '__NODE_RLFIX_EOF__\n' +
        'cat > /etc/profile.d/03nodefix.sh <<\\__NODE_FIX_EOF__\n' +
        '# Default TERM=vt100 from getty breaks altscreen apps. Upgrade.\n' +
        'case "$TERM" in vt100|""|dumb) export TERM=xterm-256color ;; esac\n' +
        '# Inject readline-columns fix for every Node process started from a shell.\n' +
        'if [ -f /etc/node-rlfix.cjs ]; then\n' +
        '  case " ${NODE_OPTIONS:-} " in\n' +
        '    *" --require=/etc/node-rlfix.cjs "*) ;;\n' +
        '    *) export NODE_OPTIONS="${NODE_OPTIONS:+$NODE_OPTIONS }--require=/etc/node-rlfix.cjs" ;;\n' +
        '  esac\n' +
        'fi\n' +
        '__NODE_FIX_EOF__\n' +
        '. /etc/profile.d/03nodefix.sh 2>/dev/null || true\n';

      // /mnt/host (9P share) is the canonical SOCIAL_HOME. Ensure the
      // expected subdirs exist with permissive modes so social.sh + the
      // overlay can write into them without UID translation surprises.
      const ensureHostDirsCmd =
        'mkdir -p -m 0777 /mnt/host/public /mnt/host/following /mnt/host/following_new /mnt/host/social_following 2>/dev/null || true\n' +
        'chmod 0777 /mnt/host/public /mnt/host/following /mnt/host/following_new /mnt/host/social_following 2>/dev/null || true\n' +
        'export SOCIAL_HOME=/mnt/host\n';

      // Seed /etc/hosts via DoH (DNS-over-HTTPS to 1.1.1.1).
      // The Fly WISP backend doesn't pass UDP/53 reliably, so plain
      // getaddrinfo / nslookup times out post-boot. HTTPS to 1.1.1.1
      // works, so we resolve the canonical traits.build + Fly hosts via
      // the JSON DoH endpoint and write them straight into /etc/hosts.
      // Idempotent via a marker-block delete on each run.
      // Includes dl-cdn.alpinelinux.org so `apk add ...` works on a
      // fresh/restored guest before tunnel-up.sh has run its own seed.
      const dohSeedCmd =
        'sed -i "/# traits-doh-begin/,/# traits-doh-end/d" /etc/hosts 2>/dev/null\n' +
        '{ echo "# traits-doh-begin"; for h in ' +
          'linuxontab.com tunnel.linuxontab.com relay.linuxontab.com ' +
          'linuxontab-tunnel.fly.dev linuxontab-net.fly.dev linuxontab-api.fly.dev ' +
          'dl-cdn.alpinelinux.org; do ' +
          'ip=$(wget -qO- --timeout=4 -t 1 ' +
            '"https://1.1.1.1/dns-query?name=${h}&type=A" ' +
            '--header="Accept: application/dns-json" 2>/dev/null ' +
            '| tr "," "\\n" ' +
            '| sed -n \'s/.*"data":"\\([0-9.]*\\)".*/\\1/p\' ' +
            '| grep -E "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" ' +
            '| head -1); ' +
          '[ -n "$ip" ] && echo "$ip $h"; ' +
        'done; echo "# traits-doh-end"; } >> /etc/hosts\n';

      // Bring up a local DNS proxy on 127.0.0.1:53 that forwards over
      // TCP to 1.1.1.1 / 1.0.0.1. Fly WISP drops UDP/53, so plain
      // /etc/resolv.conf -> 1.1.1.1 fails for any host not in the
      // DoH-seeded /etc/hosts. unbound's `forward-tcp-upstream: yes`
      // resolves arbitrary hostnames over TCP/53 which DOES pass.
      // Auto-installs unbound if missing (apk works because dl-cdn is
      // in the DoH-seeded /etc/hosts above). Always rewrites
      // unbound.conf so the apk default (which has all forward-addr
      // commented out) cannot leave us with a non-resolving daemon.
      const dnsProxyCmd =
        'if ! command -v unbound >/dev/null 2>&1; then ' +
          'echo "[dns] installing unbound..."; ' +
          'apk add --no-cache --upgrade unbound libcrypto3 libssl3 >/dev/null 2>&1 ' +
            '|| echo "[dns] apk install failed — DNS will rely on /etc/hosts only" >&2; ' +
        'fi\n' +
        'if command -v unbound >/dev/null 2>&1; then ' +
          'mkdir -p /etc/unbound /var/lib/unbound 2>/dev/null; ' +
          'printf \'%s\\n\' ' +
            '\'server:\' \'    verbosity: 0\' \'    interface: 127.0.0.1\' ' +
            '\'    port: 53\' \'    do-udp: yes\' \'    do-tcp: yes\' ' +
            '\'    do-ip4: yes\' \'    do-ip6: no\' ' +
            '\'    access-control: 127.0.0.0/8 allow\' ' +
            '\'    chroot: ""\' \'    pidfile: "/var/run/unbound.pid"\' ' +
            '\'    use-syslog: no\' \'    logfile: ""\' ' +
            '\'    hide-identity: yes\' \'    hide-version: yes\' ' +
            '\'    qname-minimisation: no\' \'    harden-glue: yes\' ' +
            '\'    cache-min-ttl: 60\' \'    cache-max-ttl: 3600\' ' +
            '\'    auto-trust-anchor-file: ""\' \'    trust-anchor-file: ""\' ' +
            '\'    val-permissive-mode: yes\' \'\' \'forward-zone:\' ' +
            '\'    name: "."\' \'    forward-tcp-upstream: yes\' ' +
            '\'    forward-first: no\' \'    forward-addr: 1.1.1.1\' ' +
            '\'    forward-addr: 1.0.0.1\' ' +
            '> /etc/unbound/unbound.conf; ' +
          'killall -q unbound 2>/dev/null; sleep 1; ' +
          'unbound -c /etc/unbound/unbound.conf >/dev/null 2>&1 & ' +
          '__ub_ok=0; __ub_i=0; while [ $__ub_i -lt 12 ]; do ' +
            'if nslookup -timeout=1 cloudflare.com 127.0.0.1 >/dev/null 2>&1; then __ub_ok=1; break; fi; ' +
            '__ub_i=$((__ub_i+1)); sleep 0.5; ' +
          'done; ' +
          'if [ "$__ub_ok" = 1 ]; then ' +
            'printf "nameserver 127.0.0.1\\nnameserver 1.1.1.1\\n" > /etc/resolv.conf; ' +
            'echo "[dns] unbound resolving OK"; ' +
          'else ' +
            'echo "[dns] unbound did not bind in time, /etc/hosts only (UDP/53 may fail)" >&2; ' +
          'fi; ' +
        'else ' +
          'echo "[dns] no unbound — relying on /etc/hosts seeds only" >&2; ' +
        'fi\n';

      const restoreNetCmd =
        rootfsCmd +
        mount9pCmd +
        ensureHostDirsCmd +
        'killall -q udhcpc 2>/dev/null\n' +
        'ip link set eth0 down 2>/dev/null\n' +
        'sleep 1\n' +
        'for i in 1 2 3 4 5; do ip link set eth0 up 2>/dev/null; sleep 1; st=$(cat /sys/class/net/eth0/operstate 2>/dev/null); fl=$(cat /sys/class/net/eth0/flags 2>/dev/null); [ "$st" != "down" ] && break; done\n' +
        'ip addr flush dev eth0 2>/dev/null\n' +
        'ip addr add 192.168.86.100/24 dev eth0\n' +
        'ip route replace default via 192.168.86.1 dev eth0 2>/dev/null\n' +
        'arp -d 192.168.86.1 2>/dev/null\n' +
        'arp -s 192.168.86.1 52:54:00:01:02:03\n' +
        'printf "nameserver 1.1.1.1\\nnameserver 1.0.0.1\\n" > /etc/resolv.conf\n' +
        dohSeedCmd +
        dnsProxyCmd +
        'echo "[restore-net] eth0 operstate=$st flags=$fl (retries=$i)"\n';

      const freshBootCmd =
        rootfsCmd +
        mount9pCmd +
        ensureHostDirsCmd +
        'ip link set eth0 up 2>/dev/null\n' +
        'udhcpc -i eth0 -q -n -f -T 2 -t 3 >/dev/null 2>&1\n' +
        'printf "nameserver 1.1.1.1\\nnameserver 1.0.0.1\\n" > /etc/resolv.conf\n' +
        dohSeedCmd +
        dnsProxyCmd +
        'clear\n' + (setupCmd ? setupCmd + '\n' : '');

      return doRestore ? restoreNetCmd : freshBootCmd;
    }

    function runNetInit() {
      if (netInited) return;
      netInited = true;
      // Stream the multi-line init script with a small inter-line delay so
      // the busybox hush serial input buffer doesn't saturate (which would
      // truncate long lines and leave the shell in continuation mode with
      // an unterminated quote).
      const script = buildNetInitCmd();
      const lines = script.split('\n');
      let i = 0;
      const sendNext = () => {
        if (!emulator || i >= lines.length) return;
        const line = lines[i++];
        if (line.length) sendGuestText(line);
        sendGuestText('\n');
        setTimeout(sendNext, 60);
      };
      sendNext();
    }

    let promptLine = '';
    let markerLine = '';
    let queuedLoginKickSent = false;
    let queuedLoginHintShown = false;
    let queuedPasswordSent = false;
    let netInitTimer = null;
    const SHELL_PROMPT_RE = /^(?!.*login:)(?!.*password:)(?:\x1b\[[0-9;]*m)*(?:[A-Za-z0-9_.-]+@)?[A-Za-z0-9_.-]+:[^\n]*#\s$/i;
    const LOGIN_PROMPT_RE = /login:\s*$/i;
    const PASSWORD_PROMPT_RE = /password:\s*$/i;
    // Optional persisted root password used for auto-login on snapshot restore.
    // Set via DevTools: localStorage['v86.root.password'] = 'dummy1234!'
    function getStoredRootPassword() {
      try {
        const v = localStorage.getItem('v86.root.password');
        return (typeof v === 'string' && v.length) ? v : '';
      } catch (_) { return ''; }
    }
    const HOST_SYNC_RE = /__HOST_SYNC__:([^\s]+)\s*$/;
    const GUEST_SYNC_OK_RE = /sync9p:\s*ok\s+(\S+)/i;
    const GUEST_SYNC_TIMEOUT_RE = /sync9p:\s*timeout\s+\(no receipt for\s+(\S+)\)/i;

    // ----- sync9p diagnostics ------------------------------------------------
    // Inspect from DevTools:
    //   window._sync9pDiag.recent      // last 200 entries (host + guest)
    //   window._sync9pDiag.stats       // aggregate counters
    //   window._sync9pDiag.errors      // last 50 errors
    //   window._sync9pDiag.fsWrites    // fs write API stats
    //   window._sync9pDiag.summary()   // compact snapshot
    //   window._sync9pDiag.reset()
    // Enable verbose console output with ?sync9p_debug=1 or
    // localStorage['sync9p.debug']==='1'.
    const SYNC9P_DEBUG = (() => {
      try {
        const q = new URLSearchParams(location.search).get('sync9p_debug');
        if (q === '1' || q === 'true') return true;
        if (typeof localStorage !== 'undefined' && localStorage.getItem('sync9p.debug') === '1') return true;
      } catch (_) {}
      return false;
    })();
    const SYNC9P_RING_MAX = 200;
    const SYNC9P_ERRORS_MAX = 50;
    function makeSync9pStats() {
      return {
        started: 0, ok: 0, timeout: 0, fs_unavailable: 0, exceptions: 0,
        write_errors: 0, verify_failures: 0, total_attempts: 0,
        guest_ok: 0, guest_timeout: 0,
        max_duration_ms: 0, total_duration_ms: 0,
        last_nonce: null, last_status: null,
        started_at: Date.now(),
      };
    }
    const sync9pDiag = (window._sync9pDiag = window._sync9pDiag || {
      recent: [], errors: [], stats: makeSync9pStats(),
      fsWrites: { count: 0, byApi: {}, errors: [], last: null },
      enabled: SYNC9P_DEBUG,
      reset() { this.recent.length = 0; this.errors.length = 0;
        this.stats = makeSync9pStats();
        this.fsWrites = { count: 0, byApi: {}, errors: [], last: null }; },
      summary() {
        const s = this.stats;
        const ok = s.ok, to = s.timeout, total = s.started || 0;
        return {
          host: { started: s.started, ok, timeout: to, fs_unavailable: s.fs_unavailable, exceptions: s.exceptions,
            success_rate: total ? (ok / total) : null,
            avg_duration_ms: ok ? Math.round((s.total_duration_ms / Math.max(ok, 1))) : null,
            max_duration_ms: s.max_duration_ms,
            total_attempts: s.total_attempts, write_errors: s.write_errors, verify_failures: s.verify_failures,
            last_nonce: s.last_nonce, last_status: s.last_status },
          guest: { ok: s.guest_ok, timeout: s.guest_timeout },
          fsWrites: { count: this.fsWrites.count, byApi: { ...this.fsWrites.byApi },
