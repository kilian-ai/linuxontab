            error_count: this.fsWrites.errors.length, last: this.fsWrites.last },
          last10: this.recent.slice(-10),
          recent_errors: this.errors.slice(-5),
        };
      },
    });
    function sync9pPush(entry) {
      sync9pDiag.recent.push(entry);
      if (sync9pDiag.recent.length > SYNC9P_RING_MAX) sync9pDiag.recent.shift();
      if (entry.error) {
        sync9pDiag.errors.push({ t: entry.t_end || entry.t_start, phase: entry.phase || 'host',
          nonce: entry.nonce, state: entry.state, error: entry.error });
        if (sync9pDiag.errors.length > SYNC9P_ERRORS_MAX) sync9pDiag.errors.shift();
      }
      if (sync9pDiag.enabled) { try { console.debug('[sync9p]', entry); } catch (_) {} }
    }

    // Watch for guest-emitted action markers on serial0 and execute them
    // host-side. Handles sync9p host receipt + records guest-perceived outcome.
    function handleHostMarker(line) {
      // Strip ANSI escapes the guest shell may have wrapped around output.
      const clean = line.replace(/\x1b\[[0-9;]*[A-Za-z]/g, '');

      // Resolve any pending one-shot markers (e.g. umount/remount handshake).
      // Done first so async save flows resume promptly even if other markers
      // would have matched.
      try { consumeOneShotMarker(clean); } catch (_) {}

      // Record guest-side sync9p outcomes (printed by the guest function
      // after polling /mnt/host/.tb-sync-<nonce>). These reveal cases where
      // the host wrote+verified the receipt but the Linux 9P client never
      // saw it (cache poisoning, mount race, etc.).
      const gOk = GUEST_SYNC_OK_RE.exec(clean);
      if (gOk) {
        sync9pDiag.stats.guest_ok++;
        sync9pPush({ phase: 'guest', nonce: gOk[1], t_end: Date.now(), state: 'guest_ok' });
      }
      const gTo = GUEST_SYNC_TIMEOUT_RE.exec(clean);
      if (gTo) {
        sync9pDiag.stats.guest_timeout++;
        sync9pPush({ phase: 'guest', nonce: gTo[1], t_end: Date.now(), state: 'guest_timeout',
          error: 'guest_poll_timeout' });
      }

      const sm = HOST_SYNC_RE.exec(clean);
      if (!sm) return;
      const nonce = sm[1].trim();
      const entry = { phase: 'host', nonce, t_start: Date.now(),
        attempts: [], state: 'started', verified: false };
      sync9pDiag.stats.started++;
      sync9pDiag.stats.last_nonce = nonce;
      sync9pPush(entry);
      // PRIMARY receipt channel: echo the nonce back over serial0. The
      // guest's sync9p() function is blocked in `read -t` on stdin and
      // will see this line. Serial is the same path everything else
      // uses (shell input/output) and is unaffected by 9P client-side
      // dentry/readdir caches that survive snapshot restore.
      try { sendGuestText('SYNC9P_RECEIPT:' + nonce + '\n'); } catch (_) {}
      (async () => {
        try {
          // Note: we used to call renderTree() here for live refresh,
          // but it could fire while the user was editing the path field
          // and caused perceived "auto-replace" of their typing. The
          // user can hit the refresh button or press Enter to reload.
          const fs = emulator && emulator.fs9p;
          if (!fs) {
            entry.state = 'fs_unavailable';
            entry.error = 'fs9p unavailable';
            entry.t_end = Date.now();
            entry.duration_ms = entry.t_end - entry.t_start;
            sync9pDiag.stats.fs_unavailable++;
            sync9pDiag.stats.last_status = 'fs_unavailable';
            sLog('sync9p: fs9p unavailable', 'err');
            return;
          }
          const receiptText = nonce + ' ' + Date.now() + '\n';
          const bytes = new TextEncoder().encode(receiptText);
          const path = '/.tb-sync-' + nonce;
          // Write-verify-retry: fsWriteFileCompat occasionally returns
          // success without the byte stream being readable back through
          // fs.read_file (silent drop, esp. after snapshot restore). Verify
          // by reading back; retry up to 4× with 120ms backoff. Without
          // this the guest's `ls /mnt/host/.tb-sync-<nonce>` poll loop
          // times out (sync9p: timeout) even though the host JS thinks
          // the write succeeded.
          let verified = false;
          for (let attempt = 0; attempt < 4 && !verified; attempt++) {
            const a = { i: attempt, t_start: Date.now() };
            sync9pDiag.stats.total_attempts++;
            try {
              const ws = Date.now();
              await fsWriteFileCompat(fs, path, bytes);
              a.write_ms = Date.now() - ws;
            } catch (e) {
              a.write_error = String(e && e.message || e);
              sync9pDiag.stats.write_errors++;
            }
            try {
              const rs = Date.now();
              const back = await fs.read_file(path);
              a.read_ms = Date.now() - rs;
              a.bytes_back = back ? back.length : -1;
              a.bytes_expected = bytes.length;
              if (back && back.length === bytes.length) { a.verified = true; verified = true; }
              else { a.verified = false; sync9pDiag.stats.verify_failures++; }
            } catch (e) {
              a.read_error = String(e && e.message || e);
              a.verified = false;
              sync9pDiag.stats.verify_failures++;
            }
            a.duration_ms = Date.now() - a.t_start;
            entry.attempts.push(a);
            if (verified) break;
            if (attempt < 3) await new Promise(r => setTimeout(r, 120));
          }
          entry.t_end = Date.now();
          entry.duration_ms = entry.t_end - entry.t_start;
          entry.verified = verified;
          entry.state = verified ? 'ok' : 'timeout';
          if (!verified) entry.error = 'verify_failed_after_4_retries';
          if (verified) {
            sync9pDiag.stats.ok++;
            sync9pDiag.stats.total_duration_ms += entry.duration_ms;
          } else {
            sync9pDiag.stats.timeout++;
          }
          if (entry.duration_ms > sync9pDiag.stats.max_duration_ms) {
            sync9pDiag.stats.max_duration_ms = entry.duration_ms;
          }
          sync9pDiag.stats.last_status = entry.state;
          if (verified) sLog('sync9p: ack ' + nonce + ' (' + entry.duration_ms + 'ms, ' + entry.attempts.length + 'x)', 'ok');
          else sLog('sync9p: ack ' + nonce + ' write not verifiable after 4 retries (' + entry.duration_ms + 'ms)', 'err');
        } catch (e) {
          entry.t_end = Date.now();
          entry.duration_ms = entry.t_end - entry.t_start;
          entry.state = 'exception';
          entry.error = String(e && e.message || e);
          sync9pDiag.stats.exceptions++;
          sync9pDiag.stats.last_status = 'exception';
          sLog('sync9p ack failed: ' + entry.error, 'err');
        }
      })();
    }

    function markShellReady() {
      if (shellReady) return;
      shellReady = true;
      queuedLoginKickSent = false;
      queuedLoginHintShown = false;
      queuedPasswordSent = false;
      serialVfs.setReady(true);
      flushPendingGuestCommands();
      // Prime stty with current cols+rows now that we know we're at a shell.
      // Without rows, Node CLIs (readline / @clack/prompts) crash with
      // ERR_INVALID_ARG_VALUE: NaN — see comment on term.onResize.
      if (lastCols && emulator) {
        sentCols = lastCols;
        sentRows = lastRows;
        const c = lastCols, r = lastRows || 24;
        const cmd =
          `stty cols ${c} rows ${r} 2>/dev/null; ` +
          `export COLUMNS=${c} LINES=${r}\n`;
        setTimeout(() => sendGuestText(cmd), 300);
      }
    }

    function maybeKickQueuedGuestLogin() {
      if (queuedLoginKickSent || shellReady) return;
      const autoLogin = (typeof window !== 'undefined') && window.__v86AutoLogin === true;
      const haveWork = pendingGuestCommands.length > 0 || (serialVfs && serialVfs.queue.length > 0);
      if (!autoLogin && !haveWork) return;
      queuedLoginKickSent = true;
      if (!queuedLoginHintShown) {
        queuedLoginHintShown = true;
        sLog('guest: logging into Alpine as root so queued guest commands can run', 'hint');
      }
      setTimeout(() => {
        if (!emulator || shellReady) return;
        sendGuestText('root\n');
      }, 120);
    }

    emulator.add_listener('serial0-output-byte', b => {
      byteCount++; pushByte(b); markDirty();
      const ch = String.fromCharCode(b);
      // Accumulate full lines so we can detect host-side action markers
      // emitted by guest scripts (e.g. sync9p prints "__HOST_SYNC__:<nonce>").
      if (ch === '\n' || ch === '\r') {
        if (markerLine) {
          const line = markerLine; markerLine = '';
          handleHostMarker(line);
        }
      } else {
        markerLine = (markerLine + ch).slice(-512);
      }
      if (!shellReady || !netInited) {
        // Any incoming byte while netInit is still pending means the guest
        // is still printing (motd, autologin, shell init) — push the
        // settle deadline back so we don't type into a half-built shell.
        if (netInitTimer) {
          clearTimeout(netInitTimer);
          netInitTimer = setTimeout(() => { netInitTimer = null; runNetInit(); }, 900);
        }
        if (ch === '\r' || ch === '\n') {
          promptLine = '';
        } else {
          promptLine = (promptLine + ch).slice(-256);
        }
        if (!shellReady && LOGIN_PROMPT_RE.test(promptLine)) {
          maybeKickQueuedGuestLogin();
          return;
        }
        if (!shellReady && queuedLoginKickSent && !queuedPasswordSent && PASSWORD_PROMPT_RE.test(promptLine)) {
          const pw = getStoredRootPassword();
          if (pw) {
            queuedPasswordSent = true;
            setTimeout(() => { if (emulator && !shellReady) sendGuestText(pw + '\n'); }, 120);
            return;
          }
        }
        // Strip ANSI CSI sequences (e.g. \x1b[6n cursor-position report)
        // before testing — agetty/busybox can append those after `# `.
        const cleanPrompt = promptLine.replace(/\x1b\[[0-9;?]*[A-Za-z]/g, '');
        if (SHELL_PROMPT_RE.test(cleanPrompt)) {
          if (!shellReady) {
            markShellReady();
          }
          // Debounce netInit start until the serial output goes idle for
          // ~900ms. On fresh boot, multiple prompt-shaped strings can flash
          // by during motd / autologin / shell init, and firing the script
          // on the first one collides with shell setup (BusyBox eats input
          // mid-redraw and the script half-runs). Reschedule on every new
          // serial byte; only when nothing has arrived for the idle window
          // do we actually start typing.
          if (!netInited) {
            if (netInitTimer) clearTimeout(netInitTimer);
            netInitTimer = setTimeout(() => { netInitTimer = null; runNetInit(); }, 900);
          }
        }
      }
    });

    // On restore the guest is idle at the shell prompt (HLT) and will not
    // emit any serial output until input wakes it up — so PROMPT_RE above
    // never fires. We also can't rely on `emulator-started`: when v86 boots
    // from a preloaded `initial_state` buffer, that event can fire before
    // all our listeners are attached, so a listener registered later simply
    // misses it (observed on 2nd+ back-to-back restores). Just schedule the
    // kicker on a plain timer — `runNetInit` is idempotent via `netInited`.
    if (doRestore && !netInited) {
      setTimeout(() => { if (emulator) sendGuestText('\n'); }, 400);
      // Fallback kicker: if no prompt-shaped output arrives within the
      // settle window (HLT'd guest with truly silent serial), force-start.
      // Cancelled automatically when prompt detection schedules its own
      // debounced timer above.
      if (!netInitTimer) {
        netInitTimer = setTimeout(() => { netInitTimer = null; runNetInit(); }, 1800);
      }
    }

    resetBtn.disabled = false;
    saveBtn.disabled = false;
    updateSnapButtonsState();

    term.focus();
  }

  async function shutdown() {
    if (!emulator) return;
    try { emulator.stop(); } catch (_) {}
    try { emulator.destroy(); } catch (_) {}
    emulator = null; window.emulator = null;
    shellReady = false; sentCols = 0;
    queuedLoginKickSent = false; queuedLoginHintShown = false; queuedPasswordSent = false; promptLine = '';
    serialVfs.ready = false; serialVfs.attached = false;
    serialVfs.busy = false; serialVfs.current = null; serialVfs.buf = '';
    bootBtn.disabled = false;
    updateSnapButtonsState();
  }

  async function doReset() { await shutdown(); await boot({ restore: false }); }
  async function doRestore() { await shutdown(); await boot({ restore: true }); }
  async function doClear() {
    const sel = parseSel(snapEl.value);
    if (!sel || sel.isFresh) return;
    await idbDel(sel.key);
    if (currentSnapName === sel.name && currentIso === sel.iso) currentSnapName = null;
    setStatus('snapshot cleared');
    await populateSnapSelect('fresh:' + sel.iso);
  }
  async function doSave() {
    if (!emulator) return;
    // save_state() is synchronous on the JS main thread and serializes the
    // full guest RAM. On a 2048 MB VM that's a ~10\u201330s tab freeze. Confirm
    // first when the snapshot will be expensive.
    if (currentMemMB && currentMemMB > AUTOSAVE_MEM_LIMIT_MB) {
      const sec = Math.ceil(currentMemMB / 100);
      const ok = window.confirm(
        `Saving will freeze this tab for ~${sec}s and write ~${currentMemMB} MB to IndexedDB.\n\n` +
        `(VM has ${currentMemMB} MB RAM. Boot with ?mem=512 in the URL for fast snapshots.)\n\n` +
        `Continue?`
      );
      if (!ok) return;
    }
    saveBtn.disabled = true;
    saveInProgress = true;
    setStatus('saving snapshot\u2026 (tab may freeze briefly)');
    try {
      // Take snapshot in unmounted state — see umountBeforeSave() comment.
      await umountBeforeSave();
      const buf = await emulator.save_state();
      // Save into the dropdown's currently-selected slot. Fresh-boot
      // selections materialize as DEFAULT_SNAP_NAME for that ISO. Named
      // selections overwrite that snapshot. This lets users switch the
      // dropdown mid-run to pick a save target.
      const selSave = parseSel(snapEl.value) || { iso: currentIso, isFresh: true };
      const targetIso = selSave.iso || currentIso;
      const targetName = (!selSave.isFresh && selSave.name) ? selSave.name : DEFAULT_SNAP_NAME;
      currentIso = targetIso;
      currentSnapName = targetName;
      const key = snapKeyFor(targetIso, targetName);
      await idbPut(key, buf);
      await remountAfterSave();
      setStatus(`snapshot saved as ${targetIso}/${targetName} (${(buf.byteLength/1048576).toFixed(1)} MB)`, 'ok');
      await populateSnapSelect(key);
    } catch (e) {
      setStatus('save failed: ' + e.message, 'err');
    } finally { saveBtn.disabled = false; saveInProgress = false; }
  }

  function uniqueSnapName(iso, base, existingNames) {
    const taken = new Set(existingNames);
    if (!taken.has(base)) return base;
    for (let i = 2; i < 1000; i++) {
      const cand = base + ' ' + i;
      if (!taken.has(cand)) return cand;
    }
    return base + ' ' + Date.now();
  }
  async function doRename() {
    const sel = parseSel(snapEl.value);
    if (!sel || sel.isFresh) return;
    const next = window.prompt('Rename snapshot', sel.name);
    if (next == null) return;
    const trimmed = next.trim();
    if (!trimmed || trimmed === sel.name) return;
    if (/[:\\/]/.test(trimmed)) {
      setStatus('rename failed: name cannot contain : / \\', 'err');
      return;
    }
    const newKey = snapKeyFor(sel.iso, trimmed);
    if (await idbHas(newKey)) {
      setStatus('rename failed: name already exists', 'err');
      return;
    }
    try {
      await idbCopy(sel.key, newKey);
      await idbDel(sel.key);
      if (currentIso === sel.iso && currentSnapName === sel.name) currentSnapName = trimmed;
      setStatus(`renamed to ${sel.iso}/${trimmed}`, 'ok');
      await populateSnapSelect(newKey);
    } catch (e) {
      setStatus('rename failed: ' + e.message, 'err');
    }
  }
  async function doClone() {
    const sel = parseSel(snapEl.value);
    if (!sel || sel.isFresh) return;
    const all = await listSnapshots();
    const sameIso = all.filter(s => s.iso === sel.iso).map(s => s.name);
    const cloneName = uniqueSnapName(sel.iso, sel.name + ' clone', sameIso);
    const newKey = snapKeyFor(sel.iso, cloneName);
    try {
      await idbCopy(sel.key, newKey);
      setStatus(`cloned to ${sel.iso}/${cloneName}`, 'ok');
      // Per spec: clone is auto-selected as the next restore target.
      await populateSnapSelect(newKey);
    } catch (e) {
      setStatus('clone failed: ' + e.message, 'err');
    }
  }

  bootBtn.onclick    = () => boot({ restore: false });
  resetBtn.onclick   = doReset;
  saveBtn.onclick    = doSave;
  restoreBtn.onclick = doRestore;
  clearBtn.onclick   = doClear;
  if (renameBtn) renameBtn.onclick = doRename;
  if (cloneBtn)  cloneBtn.onclick  = doClone;

  snapEl.onchange = async () => {
    persistSelection();
    const sel = parseSel(snapEl.value);
    if (!sel) { updateSnapButtonsState(); return; }
    if (sel.isFresh) {
      setStatus(`fresh boot — ${sel.iso}`);
    } else {
      const has = await idbHas(sel.key);
      setStatus(has ? `snapshot ${sel.iso} / ${sel.name}` : 'snapshot missing');
    }
    updateSnapButtonsState();
  };
  await populateSnapSelect();

  // ---- Keyboard input: xterm.js streams raw VT input directly ----
  // term.onData fires with a string containing already-encoded VT sequences
  // (arrow keys → ESC[A, Ctrl-C → \x03, etc.), so we just forward bytes.
  term.onData(data => {
    sendGuestText(data);
  });
  // Cmd/Ctrl+C: when there's a terminal selection, copy via browser instead of
  // sending Ctrl+C to the guest (xterm's default). Cmd/Ctrl+V: paste from
  // clipboard. Cmd/Ctrl+A: select all visible buffer.
  term.attachCustomKeyEventHandler((ev) => {
    if (ev.type !== 'keydown') return true;
    const mod = ev.metaKey || ev.ctrlKey;
    if (!mod) return true;
    const k = (ev.key || '').toLowerCase();
    if (k === 'c' && term.hasSelection()) {
      try { navigator.clipboard.writeText(term.getSelection()); } catch {}
      return false;
    }
    if (k === 'v') {
      navigator.clipboard.readText().then(t => {
        if (t) sendGuestText(t);
      }).catch(() => {});
      return false;
    }
    if (k === 'a' && ev.shiftKey === false) {
      // Cmd+A (no shift) → select all in terminal buffer
      try { term.selectAll(); } catch {}
      return false;
    }
    return true;
  });
  termEl.addEventListener('click', () => term.focus());

  // ── Global Cmd/Ctrl+C fallback ───────────────────────────────────────────
  // When the active selection is OUTSIDE xterm (viewer source/editor, panels,
  // tunnel logs, etc.), some browsers route the keystroke to the focused
  // element instead of the document selection. This handler catches Cmd/Ctrl+C
  // when there's a window-level selection and delegates to the clipboard.
  window.addEventListener('keydown', (ev) => {
    const mod = ev.metaKey || ev.ctrlKey;
    if (!mod) return;
    const k = (ev.key || '').toLowerCase();
    if (k !== 'c') return;
    // If event already targets an editable input/textarea, let the browser
    // handle it natively.
    const t = ev.target;
    const tag = (t && t.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || (t && t.isContentEditable)) return;
    // If terminal has a selection, the xterm handler above already runs.
    if (term.hasSelection && term.hasSelection()) return;
    // Otherwise copy the document selection (works inside #viewer-editor /
    // #viewer-tree contents / log areas that aren't user-select:none).
    const sel = window.getSelection && window.getSelection();
    const txt = sel ? sel.toString() : '';
    if (txt) {
      try { navigator.clipboard.writeText(txt); } catch {}
      ev.preventDefault();
    }
  }, true);

  setInterval(() => { statsEl.textContent = emulator ? `${byteCount} bytes` : ''; }, 500);

  // ─────────────────────────────────────────────────────────────────────────
  // Viewer overlay — browse files in the v86 9P share directly from the host.
  // No relay/tunnel/websocat needed. Files the guest writes under /mnt/host/*
  // appear here on the next refresh. The 9P share root (fs9p "/") is what the
  // guest sees mounted at /mnt/host — the input field accepts both forms
  // ("/mnt/host/..." guest paths and "/..." share-relative paths).
  // ─────────────────────────────────────────────────────────────────────────
  const viewerBtn   = $('viewer');
  const overlay     = $('viewer-overlay');
  const treeEl      = $('viewer-tree');
  const frameEl     = $('viewer-frame');
  const emptyEl     = $('viewer-empty');
  const pathEl      = $('viewer-path');
  const refreshBtn  = $('viewer-refresh');
  const closeBtn    = $('viewer-close');
  const vStatusEl   = $('viewer-status');
  let lastBlobUrl   = null;
  // Viewer browses the entire guest filesystem via SerialVfs (ls / cat over
  // the serial console). Paths are absolute guest paths (e.g. /, /root,
  // /mnt/host, /etc). No 9P share or tunnel is involved here.
  const VIEWER_ROOT = '/';
  const expanded    = new Set([VIEWER_ROOT]);
  // Cache: dir path -> [{name, path, dir}]. Cleared on refresh.
  const dirCache    = new Map();
  // Render generation counter; lets us discard stale async renders when the
  // user navigates faster than serial commands complete.
  let renderGen = 0;

  function normalizeViewerPath(raw) {
    let p = String(raw || '').trim();
    if (!p) return VIEWER_ROOT;
    if (!p.startsWith('/')) p = '/' + p;
    p = p.replace(/\/+/g, '/');
    if (p.length > 1) p = p.replace(/\/$/, '');
    return p || VIEWER_ROOT;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function vSet(msg, cls) { vStatusEl.textContent = msg || ''; vStatusEl.className = 'hint ' + (cls || ''); }

  function fs9p() { return emulator && emulator.fs9p; }

  // Host-side wipe — bypasses the guest's 9P kernel client entirely.
  // Use when `rm -rf /mnt/host/foo` returns EOVERFLOW ("Value too large for
  // data type") or any other 9P-side error. Operates directly on the v86
  // in-memory inode tree via fs9p.DeleteNode/Unlink/RecursiveDelete.
  // Path is relative to the 9P root (i.e. drop the `/mnt/host` prefix).
  // Examples (devtools console):
  //   wipe9p('/public')              -> wipes everything under /public
  //   wipe9p('/following/npub1xxx')  -> wipes one followed user's mirror
  //   ls9p('/public')                -> list children
  //   stat9p('/public/manifest.json')-> show inode info
  window.wipe9p = function (path) {
    const fs = fs9p(); if (!fs) return 'fs9p not ready';
    if (!path || path === '/' || path === '') return 'refuse to wipe root';
    // Strip /mnt/host prefix if user passes the guest path by accident.
    path = String(path).replace(/^\/mnt\/host/, '') || '/';
    const r = fs.SearchPath(path);
    if (!r || r.id === -1) return 'not found: ' + path;
    try { fs.DeleteNode(path); return 'wiped: ' + path; }
    catch (e) { return 'wipe failed: ' + (e && e.message || e); }
  };
  window.ls9p = function (path) {
    const fs = fs9p(); if (!fs) return 'fs9p not ready';
    path = String(path || '/').replace(/^\/mnt\/host/, '') || '/';
    const r = fs.SearchPath(path);
    if (!r || r.id === -1) return 'not found: ' + path;
    if (!fs.IsDirectory(r.id)) return 'not a dir: ' + path;
    return fs.GetChildren(r.id);
  };
  window.stat9p = function (path) {
    const fs = fs9p(); if (!fs) return 'fs9p not ready';
    path = String(path || '/').replace(/^\/mnt\/host/, '') || '/';
    const r = fs.SearchPath(path);
    if (!r || r.id === -1) return 'not found: ' + path;
    const inode = fs.GetInode(r.id);
    return {
      id: r.id, mode: '0' + (inode.mode & 0o7777).toString(8),
      type: (inode.mode & 0o170000).toString(8),
      uid: inode.uid, gid: inode.gid, size: inode.size,
      qid: { path: inode.qid.path, version: inode.qid.version, type: inode.qid.type },
      nlinks: inode.nlinks, status: inode.status,
    };
  };

  function joinPath(base, name) {
    if (base === '/' || base === '') return '/' + name;
    return base.replace(/\/+$/, '') + '/' + name;
  }
  function isDir(path) {
    const fs = fs9p(); if (!fs) return false;
    const r = fs.SearchPath(path);
    if (!r || r.id === -1) return false;
    return fs.IsDirectory(r.id);
  }
  function listDir(path) {
    const fs = fs9p(); if (!fs) return [];
    const names = fs.read_dir(path) || [];
    return names.map(n => {
      const p = joinPath(path, n);
      return { name: n, path: p, dir: isDir(p) };
    }).sort((a, b) => (b.dir - a.dir) || a.name.localeCompare(b.name));
  }

  // ── Serial-backed filesystem helpers (whole guest FS) ──────────────────
  // svfsList: list a directory using `ls -1Ap` (BusyBox). The trailing '/'
  // marker on each line distinguishes dirs from files in a single command.
  // svfsIsDir: cheap dir check via `[ -d ... ]`.
  // Strip ANSI CSI escapes that some shells inject via `ls` aliases
  // (e.g. `alias ls='ls --color=auto'`). The leading `\ls` bypasses any
  // alias on bash; for BusyBox/ash this is a no-op (no aliases by default)
  // and we still strip on the host side as a safety net.
  const ANSI_CSI_RE = /\x1b\[[0-9;]*[A-Za-z]/g;
  function stripAnsi(s) { return (s || '').replace(ANSI_CSI_RE, ''); }
  async function svfsList(path) {
    if (!serialVfs || !serialVfs.ready) return [];
    const r = await serialVfs.exec(
      `\\ls --color=never -1Ap -- ${SerialVfs._q(path)} 2>/dev/null`,
      { timeout: 15000 }
    );
    if (r.exitCode !== 0) return [];
    return stripAnsi(r.stdout).split('\n')
      .map(s => s.replace(/\r$/, ''))
      .filter(Boolean)
      .map(line => {
        const dir = line.endsWith('/');
        const name = dir ? line.slice(0, -1) : line;
        return { name, path: joinPath(path, name), dir };
      })
      .filter(e => e.name && e.name !== '.' && e.name !== '..')
      .sort((a, b) => (b.dir - a.dir) || a.name.localeCompare(b.name));
  }
  async function svfsIsDir(path) {
    if (!serialVfs || !serialVfs.ready) return false;
    const r = await serialVfs.exec(
      `[ -d ${SerialVfs._q(path)} ] && echo 1 || echo 0`,
      { timeout: 10000 }
    );
    return stripAnsi(r.stdout).replace(/\s+/g, '') === '1';
  }
  async function getDir(path, force = false) {
    if (!force && dirCache.has(path)) return dirCache.get(path);
    const ents = await svfsList(path);
    dirCache.set(path, ents);
    return ents;
  }

  async function renderTree() {
    if (!serialVfs || !serialVfs.ready) {
      treeEl.innerHTML = '<div class="row hint" style="padding:8px 12px">shell not ready — wait for guest prompt</div>';
      return;
    }
    const myGen = ++renderGen;
    const root = normalizeViewerPath(pathEl.value);
    // Never write back to pathEl here — the user owns that field.
    // (Previously we normalized the value while unfocused, but any
    // automatic rerender would still flicker the input.)
    if (!await svfsIsDir(root)) {
      if (myGen !== renderGen) return;
      treeEl.innerHTML = `<div class="row hint" style="padding:8px 12px">not a directory: ${escapeHtml(root)}</div>`;
      return;
    }
    if (myGen !== renderGen) return;
    expanded.add(root);
    const out = [];
    async function walk(dirPath, depth) {
      const entries = await getDir(dirPath);
      if (myGen !== renderGen) return;
      for (const e of entries) {
        const cls = e.dir ? ('dir' + (expanded.has(e.path) ? ' open' : '')) : 'file';
        const indent = depth > 5 ? 5 : depth;
        out.push(`<div class="row ${cls} indent-${indent}" data-path="${escapeHtml(e.path)}" data-dir="${e.dir ? 1 : 0}">${escapeHtml(e.name)}</div>`);
        if (e.dir && expanded.has(e.path)) await walk(e.path, depth + 1);
        if (myGen !== renderGen) return;
      }
    }
    await walk(root, 1);
    if (myGen !== renderGen) return;
    treeEl.innerHTML = out.join('') || '<div class="row hint" style="padding:8px 12px">empty</div>';
  }

  function mimeFor(path) {
    const ext = (path.split('.').pop() || '').toLowerCase();
    return ({
      html:'text/html', htm:'text/html',
      js:'text/javascript', mjs:'text/javascript',
      css:'text/css', json:'application/json',
      svg:'image/svg+xml', png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
      gif:'image/gif', webp:'image/webp', ico:'image/x-icon',
      txt:'text/plain', md:'text/plain', log:'text/plain',
      pdf:'application/pdf', wasm:'application/wasm',
    })[ext] || 'text/plain;charset=utf-8';
  }

  // Hard cap for in-viewer file reads. base64-over-serial is slow and
  // monopolizes the guest shell while it runs — reading a multi-MB JS/HTML
  // file made the whole tab look frozen. 1 MiB is a comfortable upper bound
  // for the kind of preview content this viewer is meant for.
  const VIEWER_MAX_BYTES = 1024 * 1024;

  // ── Render/Source tabs + Monaco editor ──────────────────────────────
  const tabsEl       = $('viewer-tabs');
  const tabRenderBtn = $('viewer-tab-render');
  const tabSourceBtn = $('viewer-tab-source');
  const vSaveBtn      = $('viewer-save');
  const tabStatusEl  = $('viewer-tab-status');
  const editorEl     = $('viewer-editor');

  // Per-file state for the currently-open file.
  const cur = {
    path: null,
    bytes: null,        // Uint8Array — original bytes
    text: null,         // decoded text if printable
    isText: false,
    mime: null,
    dirty: false,
    tab: 'render',      // 'render' | 'source'
  };

  let monacoLoading  = null;   // Promise resolving to monaco namespace
  let monacoEditor   = null;   // monaco.editor.IStandaloneCodeEditor
  let monacoModel    = null;

  const MONACO_BASE = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min';

  function loadMonaco() {
    if (monacoLoading) return monacoLoading;
    monacoLoading = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = MONACO_BASE + '/vs/loader.js';
      s.onload = () => {
        try {
          window.require.config({ paths: { vs: MONACO_BASE + '/vs' } });
          window.MonacoEnvironment = {
            getWorkerUrl: () => `data:text/javascript;charset=utf-8,${encodeURIComponent(`
              self.MonacoEnvironment = { baseUrl: '${MONACO_BASE}/' };
              importScripts('${MONACO_BASE}/vs/base/worker/workerMain.js');
            `)}`,
          };
          window.require(['vs/editor/editor.main'], () => resolve(window.monaco));
        } catch (e) { reject(e); }
      };
      s.onerror = () => reject(new Error('failed to load monaco loader'));
      document.head.appendChild(s);
    });
    return monacoLoading;
  }

  function langFor(path) {
    const ext = (path.split('.').pop() || '').toLowerCase();
    return ({
      html:'html', htm:'html', xml:'xml', svg:'xml',
      js:'javascript', mjs:'javascript', cjs:'javascript',
      ts:'typescript', tsx:'typescript', jsx:'javascript',
      css:'css', scss:'scss', less:'less',
      json:'json', md:'markdown', markdown:'markdown',
      py:'python', rs:'rust', go:'go', sh:'shell', bash:'shell',
      yml:'yaml', yaml:'yaml', toml:'ini', ini:'ini', conf:'ini',
      sql:'sql', lua:'lua', c:'c', h:'c', cpp:'cpp', hpp:'cpp',
      java:'java', kt:'kotlin', rb:'ruby', php:'php', dockerfile:'dockerfile',
      txt:'plaintext', log:'plaintext',
    })[ext] || 'plaintext';
  }

  // Heuristic: treat as text if no NUL bytes and ≥95% printable/whitespace.
  function isLikelyText(bytes) {
    if (!bytes || !bytes.length) return true;
    const sample = bytes.subarray(0, Math.min(bytes.length, 4096));
    let printable = 0;
    for (let i = 0; i < sample.length; i++) {
      const b = sample[i];
      if (b === 0) return false;
      if (b === 9 || b === 10 || b === 13 || (b >= 32 && b < 127) || b >= 128) printable++;
    }
    return printable / sample.length > 0.95;
  }

  async function ensureEditor() {
    const monaco = await loadMonaco();
    if (!monacoEditor) {
      monacoEditor = monaco.editor.create(editorEl, {
        value: '',
        language: 'plaintext',
        theme: 'vs-dark',
        automaticLayout: true,
        lineNumbers: 'on',
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        fontSize: 12,
        wordWrap: 'on',
        tabSize: 2,
      });
      monacoEditor.onDidChangeModelContent(() => {
        if (!cur.path) return;
        cur.dirty = true;
        cur.text  = monacoEditor.getValue();
        vSaveBtn.hidden = false;
        vSaveBtn.textContent = 'save *';
      });
      // Cmd/Ctrl+S to save
      monacoEditor.addCommand(
        monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
        () => saveCurrent()
      );
    }
    return monaco;
  }

  async function setSourceFromCurrent() {
    if (!cur.path) return;
    const monaco = await ensureEditor();
    const lang = langFor(cur.path);
    if (monacoModel) { try { monacoModel.dispose(); } catch (_) {} monacoModel = null; }
    monacoModel = monaco.editor.createModel(cur.text || '', lang);
    monacoEditor.setModel(monacoModel);
    monacoEditor.setScrollTop(0);
  }

  function setRenderFromCurrent() {
    if (!cur.path || !cur.bytes) return;
    if (lastBlobUrl) { try { URL.revokeObjectURL(lastBlobUrl); } catch (_) {} lastBlobUrl = null; }
    const blob = new Blob([cur.bytes], { type: cur.mime || mimeFor(cur.path) });
    lastBlobUrl = URL.createObjectURL(blob);
    frameEl.src = lastBlobUrl;
  }

  async function showTab(tab) {
    cur.tab = tab;
    tabRenderBtn.classList.toggle('vt-active', tab === 'render');
    tabSourceBtn.classList.toggle('vt-active', tab === 'source');
    if (tab === 'render') {
      frameEl.hidden  = false;
      editorEl.hidden = true;
    } else {
      editorEl.hidden = false;
      frameEl.hidden  = true;
      await setSourceFromCurrent();
      try { monacoEditor && monacoEditor.layout(); } catch (_) {}
    }
  }

  async function saveCurrent() {
    if (!cur.path) return;
    if (!cur.dirty) { tabStatusEl.textContent = 'no changes'; return; }
    if (!cur.isText) { tabStatusEl.textContent = 'binary file — refusing to save'; return; }
    const text = monacoEditor ? monacoEditor.getValue() : cur.text;
    vSaveBtn.disabled = true;
    vSaveBtn.textContent = 'saving…';
    tabStatusEl.textContent = 'writing ' + cur.path + '…';
    try {
      await serialVfs.write(cur.path, text);
      cur.text  = text;
      cur.bytes = new TextEncoder().encode(text);
      cur.dirty = false;
      vSaveBtn.textContent = 'saved';
      tabStatusEl.textContent = 'saved (' + cur.bytes.length + ' B)';
      // If the render tab is currently shown, refresh the iframe content.
      if (cur.tab === 'render') setRenderFromCurrent();
      setTimeout(() => {
        if (!cur.dirty) vSaveBtn.textContent = 'save';
      }, 1500);
    } catch (e) {
      tabStatusEl.textContent = 'save failed: ' + (e && e.message || e);
      vSaveBtn.textContent = 'save';
    } finally {
      vSaveBtn.disabled = false;
    }
  }

  tabRenderBtn.addEventListener('click', () => showTab('render'));
  tabSourceBtn.addEventListener('click', () => showTab('source'));
  vSaveBtn.addEventListener('click', () => saveCurrent());

  async function openFile(path) {
    if (!serialVfs || !serialVfs.ready) { vSet('shell not ready', 'err'); return; }
    vSet('checking ' + path);
    // Probe size first via stat so we never start a multi-minute base64
    // stream on a huge binary by accident.
    let size = -1;
    try {
      const st = await serialVfs.stat(path);
      if (st && Number.isFinite(st.size)) size = st.size;
    } catch (_) {}
    if (size > VIEWER_MAX_BYTES) {
      vSet(`too large to preview (${size} bytes > ${VIEWER_MAX_BYTES}). open a shell to inspect.`, 'err');
      return;
    }
    vSet(`loading ${path}${size >= 0 ? ' (' + size + ' B)' : ''}`);
    let data;
    try { data = await serialVfs.read(path); }
    catch (e) { vSet('error: ' + (e && e.message || e), 'err'); return; }
    if (!data) { vSet('empty or missing: ' + path, 'err'); return; }

    cur.path   = path;
    cur.bytes  = data;
    cur.mime   = mimeFor(path);
    cur.isText = isLikelyText(data);
    cur.text   = cur.isText ? new TextDecoder('utf-8', { fatal: false }).decode(data) : null;
    cur.dirty  = false;

    emptyEl.hidden = true;
    tabsEl.hidden  = false;
    vSaveBtn.hidden = !cur.isText;
    vSaveBtn.textContent = 'save';
    tabStatusEl.textContent = '';

    setRenderFromCurrent();
    if (cur.tab === 'source') {
      await setSourceFromCurrent();
      editorEl.hidden = false;
      frameEl.hidden  = true;
    } else {
      frameEl.hidden  = false;
      editorEl.hidden = true;
    }
    vSet(`${path} (${data.length} bytes)`, 'ok');
  }

  treeEl.addEventListener('click', e => {
    const row = e.target.closest('.row'); if (!row) return;
    const path = row.dataset.path;
    if (row.dataset.dir === '1') {
      if (expanded.has(path)) expanded.delete(path); else expanded.add(path);
      renderTree();
    } else {
      treeEl.querySelectorAll('.row.sel').forEach(r => r.classList.remove('sel'));
      row.classList.add('sel');
      openFile(path);
    }
  });
  refreshBtn.onclick = () => {
    dirCache.clear();
    renderTree();
    vSet('reloaded');
  };
  pathEl.onkeydown = e => {
    if (e.key === 'Enter') {
      // Navigating to a new root: drop expansion + cache so the new tree is fresh.
      expanded.clear();
      dirCache.clear();
      renderTree();
    }
  };
  // No onblur normalizer — we never want to mutate what the user typed.
  // Normalization happens at submit time (Enter / refresh / openViewer).
  const divider = $('viewer-divider');
  const fullscreenBtn = $('viewer-fullscreen');
  function setViewerOpen(open) {
    overlay.hidden = !open;
    if (divider) divider.hidden = !open;
    if (!open) {
      // restore terminal if we were full-screen
      document.body.classList.remove('term-hidden');
      if (fullscreenBtn) fullscreenBtn.textContent = '\u2922';
    }
  }
  closeBtn.onclick = () => { setViewerOpen(false); term.focus(); };
  if (fullscreenBtn) fullscreenBtn.onclick = () => {
    const hidden = document.body.classList.toggle('term-hidden');
    fullscreenBtn.textContent = hidden ? '\u2923' : '\u2922';
    fullscreenBtn.title = hidden ? 'show terminal' : 'hide terminal \u2014 full-screen viewer';
    if (!hidden) try { term.focus(); } catch {}
  };
  // Divider drag → resize terminal area
  if (divider) {
    let dragging = false;
    const onMove = (e) => {
      if (!dragging) return;
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      const vh = window.innerHeight;
      // clamp terminal height between 80px and (vh - 36 - 120)
      let termH = vh - y;
      if (termH < 80) termH = 80;
      if (termH > vh - 36 - 120) termH = vh - 36 - 120;
      document.documentElement.style.setProperty('--term-h', termH + 'px');
      e.preventDefault();
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      document.body.classList.remove('dragging-divider');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    const onDown = (e) => {
      dragging = true;
      document.body.classList.add('dragging-divider');
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchmove', onMove, { passive:false });
      window.addEventListener('touchend', onUp);
      e.preventDefault();
    };
    divider.addEventListener('mousedown', onDown);
    divider.addEventListener('touchstart', onDown, { passive:false });
  }
  viewerBtn.onclick = async () => {
    if (!emulator) { setStatus('boot v86 first', 'err'); return; }
    if (!overlay.hidden) {
      // toggle off
      setViewerOpen(false);
      term.focus();
      return;
    }
    if (!serialVfs) { setStatus('serial vfs unavailable', 'err'); return; }
    // Trust the user: if they clicked the viewer button, assume the shell is
    // up. The prompt-detector sometimes misses the prompt (snapshot restore,
    // ANSI noise, etc.) and we don't want a permanently-disabled UI. If the
    // shell really isn't ready, exec() will time out and the tree shows an
    // error row instead.
    if (!serialVfs.ready && typeof serialVfs.setReady === 'function') {
      serialVfs.setReady(true);
    }
    setViewerOpen(true);
    vSet('listing…');
    if (!pathEl.value) pathEl.value = VIEWER_ROOT;
    expanded.clear();
    dirCache.clear();
    await renderTree();
    vSet('ready (serial-backed)', 'ok');
  };
  // Toggle viewer button availability when emulator boots/stops or shell becomes ready.
  function syncViewerBtn() {
    // Enable viewer whenever the emulator is running. If the shell isn't
    // ready yet, the viewer overlay itself will show a "shell not ready"
    // hint instead of leaving the button looking permanently broken.
    viewerBtn.disabled = !emulator;
  }
  setInterval(syncViewerBtn, 800);


  // ── follow panel ──────────────────────────────────────────────────────
  // Side panel (does not fully overlap the terminal). Bootstrap pipeline:
  //   1. `which social` → wget+chmod if missing
  //   2. `social pubkey` → `social init` if missing, then `social pubkey`
  //   3. Display npub.
  // Refresh button reruns the same pipeline. Other buttons are placeholders.
  const followBtn        = $('follow');
  const followPanel      = $('follow-panel');
  const followCloseBtn   = $('follow-close');
  const followRefreshBtn = $('follow-refresh');
  const followNpubEl     = $('follow-npub');
  const followStatusEl   = $('follow-status');
  const followLogEl      = $('follow-log');

  function fLog(line, cls) {
    const d = document.createElement('div');
    d.className = 'fl-' + (cls || 'info');
    d.textContent = line;
    followLogEl.appendChild(d);
    followLogEl.scrollTop = followLogEl.scrollHeight;
  }
  function fStatus(msg, cls) {
    followStatusEl.textContent = msg;
    followStatusEl.style.color = cls === 'err' ? '#f87171'
                              : cls === 'ok'  ? '#4ade80'
                              : '#7a8392';
  }

  // Run a shell command via SerialVfs and log it. Returns {stdout, exitCode, timedOut}.
  async function followRun(cmd, opts) {
    fLog('$ ' + cmd, 'cmd');
    if (!serialVfs || !serialVfs.ready) {
      fLog('(serial shell not ready)', 'err');
      return { stdout: '', exitCode: -1, timedOut: false, notReady: true };
    }
    const r = await serialVfs.exec(cmd, opts || { timeout: 60000 });
    const out = (r.stdout || '').replace(/\r/g, '').replace(/\n+$/, '');
    if (out) fLog(out, 'out');
    const tag = r.timedOut ? 'TIMEOUT' : ('exit=' + r.exitCode);
    fLog('  → ' + tag, r.exitCode === 0 ? 'ok' : 'err');
    return r;
  }

  function extractNpub(text) {
    const m = (text || '').match(/npub1[0-9a-z]{20,}/i);
    return m ? m[0] : null;
  }

  let followBootstrapInFlight = false;
  async function followBootstrap() {
    if (followBootstrapInFlight) return;
    followBootstrapInFlight = true;
    followRefreshBtn.disabled = true;
    fStatus('running bootstrap…');
    fLog('── bootstrap start ──', 'info');
    try {
      if (!emulator) { fStatus('boot v86 first', 'err'); fLog('no emulator', 'err'); return; }
      if (!serialVfs) {
        fStatus('serial vfs unavailable', 'err');
        fLog('serialVfs missing', 'err');
        return;
      }
      // Trust the user: if they clicked the button, assume shell is up.
      // Prompt-detector sometimes misses the prompt (snapshot restore, ANSI noise).
      if (!serialVfs.ready && typeof serialVfs.setReady === 'function') {
        serialVfs.setReady(true);
        fLog('(forcing shell-ready — exec will time out if guest not really up)', 'info');
      }

      // Step 1: check for /usr/local/bin/social (or anywhere on PATH)
      fStatus('1/3 checking social CLI…');
      const which = await followRun('which social || true', { timeout: 15000 });
      const socialPath = (which.stdout || '').replace(/\s+/g, '');
      if (!socialPath || !socialPath.startsWith('/')) {
        fStatus('1/3 installing social CLI…');
        fLog('social not found — downloading', 'info');
        const dl = await followRun(
          'wget -O /usr/local/bin/social https://linuxontab.com/local/social.sh && chmod +x /usr/local/bin/social',
          { timeout: 90000 }
        );
        if (dl.exitCode !== 0) {
          fStatus('install failed', 'err');
          fLog('wget/chmod failed — check network (DNS / unbound) and try again', 'err');
          return;
        }
      } else {
        fLog('found: ' + socialPath, 'ok');
      }

      // Step 2: social pubkey → init if needed → pubkey
      fStatus('2/3 reading pubkey…');
      let pk = await followRun('social pubkey 2>&1 || true', { timeout: 30000 });
      let npub = extractNpub(pk.stdout);
      if (!npub) {
        fStatus('2/3 no key — running social init…');
        fLog('no pubkey yet — generating identity', 'info');
        const init = await followRun('social init 2>&1', { timeout: 60000 });
        const initNpub = extractNpub(init.stdout);
        if (initNpub) {
          npub = initNpub;
        } else {
          fStatus('3/3 re-reading pubkey…');
          pk = await followRun('social pubkey 2>&1 || true', { timeout: 30000 });
          npub = extractNpub(pk.stdout);
        }
      }

      // Step 3: display
      if (npub) {
        followNpubEl.textContent = npub;
        followNpubEl.style.color = '#4ade80';
        fStatus('ready', 'ok');
        fLog('── bootstrap ok ──', 'ok');
        // Enable real actions now that we have an identity.
        followPublishBtn.disabled = false;
        followPublishBtn.title = 'Publish $SOCIAL_HOME/public to Nostr relays';
        followFollowBtn.disabled = false;
        followFollowBtn.title = 'Follow an npub and mirror their published files';
        followSyncBtn.disabled = false;
        followSyncBtn.title = 'Re-sync all followed users';
        followListBtn.disabled = false;
        followListBtn.title = 'Show who you currently follow';
        followSearchBtn.disabled = false;
        followSearchBtn.title = 'NIP-50 keyword search across relays';
      } else {
        followNpubEl.innerHTML = '<span class="hint">(could not determine npub — see log)</span>';
        fStatus('failed to obtain npub', 'err');
        fLog('── bootstrap failed ──', 'err');
      }
    } catch (err) {
      fStatus('error: ' + (err && err.message || err), 'err');
      fLog('exception: ' + (err && err.stack || err), 'err');
    } finally {
      followBootstrapInFlight = false;
      followRefreshBtn.disabled = false;
    }
  }

  followBtn.onclick = async () => {
    if (!emulator) { setStatus('boot v86 first', 'err'); return; }
    if (!followPanel.hidden) {
      // toggle off
      followPanel.hidden = true;
      term.focus();
      return;
    }
    // mutually exclusive with tunnels panel
    if (tunnelsPanel && !tunnelsPanel.hidden) tunnelsPanel.hidden = true;
    followPanel.hidden = false;
    // Auto-run bootstrap once when first opened (log empty == fresh).
    if (!followLogEl.children.length) {
      followBootstrap();
    }
  };
  followCloseBtn.onclick = () => { followPanel.hidden = true; term.focus(); };
  followRefreshBtn.onclick = () => { followBootstrap(); };

  // ── publish ───────────────────────────────────────────────────────────
  // Pipeline:
  //   1. Locate SOCIAL_HOME (the dir that contains .nsec) and its public/ subdir.
  //   2. Refuse to publish if public/ is empty (would just litter relays).
  //   3. Ensure websocat is installed (via apk; falls back to social tunnel-up
  //      which also installs it).
  //   4. Ensure a tunnel base URL is cached so peers can actually fetch files;
  //      run `social tunnel-up 8080` if missing.
  //   5. Run `social publish 2>&1` and surface the result.
  const followPublishBtn = $('follow-action-publish');
  const followFollowBtn  = $('follow-action-follow');
  const followSyncBtn    = $('follow-action-sync');
  const followListBtn    = $('follow-action-list');
  const followSearchBtn  = $('follow-action-search');
  let followPublishInFlight = false;
  async function followPublish() {
    if (followPublishInFlight) return;
    followPublishInFlight = true;
    followPublishBtn.disabled = true;
    fStatus('publishing…');
    fLog('── publish start ──', 'info');
    try {
      // 1. Locate SOCIAL_HOME via the nsec file social.sh writes.
      const home = await followRun(
        'for d in /mnt/host "$HOME" "$PWD"; do if [ -f "$d/.nsec" ]; then echo "$d"; break; fi; done',
        { timeout: 10000 }
      );
      const socialHome = (home.stdout || '').trim();
      if (!socialHome) {
        fStatus('no identity yet — run refresh', 'err');
        fLog('no .nsec file found in /mnt/host, $HOME, or $PWD', 'err');
        return;
      }
      fLog('SOCIAL_HOME = ' + socialHome, 'ok');

      // 2. Verify public/ exists and has content.
      const ls = await followRun(
        'mkdir -p "' + socialHome + '/public" && find "' + socialHome + '/public" -type f 2>/dev/null | wc -l',
        { timeout: 10000 }
      );
      const nFiles = parseInt((ls.stdout || '0').trim(), 10) || 0;
      if (nFiles === 0) {
        fStatus('public/ is empty', 'err');
        fLog('Nothing to publish — drop files into ' + socialHome + '/public/ first.', 'err');
        fLog('Tip: in the terminal run:  echo hello > ' + socialHome + '/public/note.txt', 'info');
        return;
      }
      fLog('found ' + nFiles + ' file(s) under ' + socialHome + '/public', 'ok');

      // 3. Ensure websocat (publish hard-fails without it).
      // Alpine ISO ships with only its in-CD repo; websocat lives in edge/community.
      // We seed both edge repos (idempotent) and `apk update` before installing.
      const ws = await followRun('which websocat || true', { timeout: 10000 });
      if (!(ws.stdout || '').trim().startsWith('/')) {
        fStatus('adding edge repos & installing websocat…');
        fLog('websocat missing — seeding edge/main + edge/community', 'info');
        const seedRepos =
          'grep -q "edge/main" /etc/apk/repositories || ' +
          'echo "https://dl-cdn.alpinelinux.org/alpine/edge/main" >> /etc/apk/repositories; ' +
          'grep -q "edge/community" /etc/apk/repositories || ' +
          'echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories; ' +
          'apk update 2>&1 | tail -3';
        await followRun(seedRepos, { timeout: 60000 });
        fLog('apk add websocat (from edge/community)…', 'info');
        const apk = await followRun(
          'apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community websocat 2>&1 | tail -5',
          { timeout: 120000 }
        );
        if (apk.exitCode !== 0) {
          fStatus('failed to install websocat', 'err');
          fLog('Could not install websocat. Check guest networking (DNS / unbound) and try refresh.', 'err');
          fLog('Manual: apk update && apk add --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community websocat', 'info');
          return;
        }
        // Verify
        const ws2 = await followRun('which websocat || true', { timeout: 10000 });
        if (!(ws2.stdout || '').trim().startsWith('/')) {
          fStatus('websocat install reported success but binary not found', 'err');
          return;
        }
        fLog('websocat installed: ' + (ws2.stdout || '').trim(), 'ok');
      } else {
        fLog('websocat: ' + (ws.stdout || '').trim(), 'ok');
      }

      // 4. Ensure tunnel base URL cached. Run social tunnel-up 8080 if not.
      const tu = await followRun(
        'test -s "' + socialHome + '/.social.tunnel" && cat "' + socialHome + '/.social.tunnel" || true',
        { timeout: 10000 }
      );
      const cachedTunnel = (tu.stdout || '').trim();
      if (!cachedTunnel) {
        fStatus('starting tunnel (port 8080)…');
        fLog('no tunnel cached — running `social tunnel-up 8080`', 'info');
        const t = await followRun('social tunnel-up 8080 2>&1', { timeout: 120000 });
        if (t.exitCode !== 0) {
          fLog('tunnel-up failed (publishing without `r` tag — files won\'t be fetchable)', 'err');
        }
      } else {
        fLog('tunnel cached: ' + cachedTunnel, 'ok');
      }

      // 5. Sign + broadcast.
      fStatus('signing & broadcasting…');
      const pub = await followRun('social publish 2>&1', { timeout: 120000 });
      const out = (pub.stdout || '');
      // Parse "published as npub... (ok=N fail=M files=K bytes=B)"
      const m = out.match(/published as (npub1[0-9a-z]+)\s*\(ok=(\d+)\s+fail=(\d+)\s+files=(\d+)\s+bytes=(\d+)\)/i);
      if (m && parseInt(m[2], 10) > 0) {
        fStatus('published ✓ (ok=' + m[2] + '/fail=' + m[3] + ', ' + m[4] + ' files)', 'ok');
        fLog('── publish ok ──', 'ok');
      } else if (pub.exitCode === 0) {
        fStatus('publish completed (no relay confirmations)', 'err');
        fLog('── publish completed but no relays acked ──', 'err');
      } else {
        fStatus('publish failed (exit ' + pub.exitCode + ')', 'err');
        fLog('── publish failed ──', 'err');
      }
    } catch (err) {
      fStatus('error: ' + (err && err.message || err), 'err');
      fLog('exception: ' + (err && err.stack || err), 'err');
    } finally {
      followPublishInFlight = false;
      followPublishBtn.disabled = false;
    }
  }
  followPublishBtn.onclick = () => { followPublish(); };

  // ── follow / sync / list / search ────────────────────────────────────
  // Wired to social.sh CLI commands. social follow auto-syncs the new
  // npub (creates /mnt/host/following/<npub>/ and mirrors files in one shot).
  let followActionInFlight = false;
  async function followAction(label, cmd, timeout) {
    if (followActionInFlight) return;
    followActionInFlight = true;
    [followFollowBtn, followSyncBtn, followListBtn, followSearchBtn].forEach(b => b.disabled = true);
    fStatus(label + '…');
    fLog('── ' + label + ' start ──', 'info');
    try {
      const r = await followRun(cmd, { timeout: timeout || 120000 });
      if (r.exitCode === 0) {
        fStatus(label + ' ok', 'ok');
        fLog('── ' + label + ' ok ──', 'ok');
      } else {
        fStatus(label + ' failed (exit ' + r.exitCode + ')', 'err');
        fLog('── ' + label + ' failed ──', 'err');
      }
    } catch (err) {
      fStatus('error: ' + (err && err.message || err), 'err');
      fLog('exception: ' + (err && err.stack || err), 'err');
    } finally {
      followActionInFlight = false;
      [followFollowBtn, followSyncBtn, followListBtn, followSearchBtn].forEach(b => b.disabled = false);
    }
  }

  followFollowBtn.onclick = () => {
    const npub = (prompt('Follow which npub?\n(paste npub1...)') || '').trim();
    if (!npub) return;
    if (!/^npub1[0-9a-z]{20,}$/i.test(npub)) {
      fStatus('invalid npub', 'err');
      fLog('expected npub1... — got: ' + npub, 'err');
      return;
    }
    // social follow auto-syncs (mirrors files into /mnt/host/following/<npub>/)
    followAction('follow ' + npub.slice(0, 12) + '…', 'social follow ' + npub + ' 2>&1', 180000);
  };
  followSyncBtn.onclick   = () => followAction('sync all',  'social sync 2>&1', 240000);
  followListBtn.onclick   = () => followAction('list',      'social list 2>&1', 15000);
  followSearchBtn.onclick = () => {
    const q = (prompt('Search Nostr profiles for:') || '').trim();
    if (!q) return;
    // shell-escape: replace single-quotes with '\''
    const safe = q.replace(/'/g, "'\\''");
    followAction('search ' + q, "social search '" + safe + "' 2>&1", 60000);
  };

  setInterval(() => { followBtn.disabled = !emulator; }, 800);

  // ─────────────────────────────────────────────────────────────────────────
  // Tunnels panel — manages lifecycle of running tunnels (ssh, social, etc.)
  // Reads guest state from /tmp/tunnel.code, /tmp/tunnel.pids, /tmp/tunnel.cmd
  // Pretty-formats one row per tunnel with relay-side status, supports
  // start / stop / restart / edit-cmd. Edited commands are persisted to
  // localStorage (per pairing-code) and used by future restart actions.
  // ─────────────────────────────────────────────────────────────────────────
  const tunnelsBtn         = $('tunnels');
  const tunnelsPanel       = $('tunnels-panel');
  const tunnelsCloseBtn    = $('tunnels-close');
  const tunnelsRefreshBtn  = $('tunnels-refresh');
  const tunnelsListEl      = $('tunnels-list');
  const tunnelsLogEl       = $('tunnels-log');

  const TUNNEL_CMD_OVERRIDE_PREFIX = 'traits.tunnels.cmd.';
  // NOTE: Default cmd must be POSIX-portable. BusyBox/hush in Alpine does NOT
  // support bash process substitution `sh <(curl ...)`. Use wget|sh -s ... .
  const TUNNEL_DEFAULT_CMD = 'wget -qO- https://linuxontab.com/local/tunnel-up.sh | sh -s 22 8080 22000 8384';
  const TUNNEL_RELAY_ENDPOINTS = [
    'https://linuxontab-tunnel.fly.dev',
    'https://tunnel.linuxontab.com',
  ];

  function tnLog(line, cls) {
    const d = document.createElement('div');
    d.className = 'tl-' + (cls || 'info');
    d.textContent = line;
    tunnelsLogEl.appendChild(d);
    tunnelsLogEl.scrollTop = tunnelsLogEl.scrollHeight;
  }

  async function tnExec(cmd, opts) {
    if (!serialVfs || !serialVfs.ready) {
      if (serialVfs && typeof serialVfs.setReady === 'function') {
        try { serialVfs.setReady(true); } catch (_) {}
      }
    }
    if (!serialVfs) return { stdout: '', exitCode: -1, timedOut: true };
    return serialVfs.exec(cmd, opts || { timeout: 20000 });
  }

  function tnGetCmdOverride(code) {
    if (!code) return null;
    try { return localStorage.getItem(TUNNEL_CMD_OVERRIDE_PREFIX + code); } catch (_) { return null; }
  }
  function tnSetCmdOverride(code, cmd) {
    if (!code) return;
    try {
      if (cmd && cmd.trim()) localStorage.setItem(TUNNEL_CMD_OVERRIDE_PREFIX + code, cmd);
      else localStorage.removeItem(TUNNEL_CMD_OVERRIDE_PREFIX + code);
    } catch (_) {}
  }
  function tnEffectiveCmd(code) {
    // Resolution order: per-code override → __default__ override → hard-coded default.
    return tnGetCmdOverride(code) || tnGetCmdOverride('__default__') || TUNNEL_DEFAULT_CMD;
  }

  async function tnFetchRelayStatus(code) {
    if (!code) return null;
    for (const base of TUNNEL_RELAY_ENDPOINTS) {
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 4000);
        const r = await fetch(base + '/port/status?code=' + encodeURIComponent(code), { signal: ctrl.signal });
        clearTimeout(t);
        if (!r.ok) continue;
        const j = await r.json();
        return { endpoint: base, ...j };
      } catch (_) {}
    }
    return null;
  }

  async function tnDiscoverTunnels() {
    // Single guest call to gather everything we need.
    // Outputs distinct sections marked with sentinels for easy parsing.
    const cmd =
      'echo __TUNNEL_CODE__; cat /tmp/tunnel.code 2>/dev/null; ' +
      'echo __TUNNEL_PORTS__; cat /tmp/tunnel.ports 2>/dev/null; ' +
      'echo __TUNNEL_PIDS__; cat /tmp/tunnel.pids 2>/dev/null; ' +
      'echo __TUNNEL_CMD__; cat /tmp/tunnel.cmd 2>/dev/null; ' +
      'echo __TUNNEL_PS__; ps -o pid,args 2>/dev/null | grep -E "websocat|tunnel-up" | grep -v grep || true; ' +
      'echo __TUNNEL_END__';
    const r = await tnExec(cmd, { timeout: 15000 });
    const out = (r.stdout || '').replace(/\r/g, '');
    function section(name) {
      const re = new RegExp('__' + name + '__\\n([\\s\\S]*?)(?=__TUNNEL_[A-Z]+__|$)');
      const m = out.match(re);
      return m ? m[1].trim() : '';
    }
    const code  = section('TUNNEL_CODE');
    const ports = section('TUNNEL_PORTS').split(/\s+/).filter(Boolean);
    const pids  = section('TUNNEL_PIDS').split(/\s+/).filter(Boolean);
    const cmdFile = section('TUNNEL_CMD');
    const ps    = section('TUNNEL_PS').split(/\n/).map(s => s.trim()).filter(Boolean);

    const tunnels = [];
    if (code) {
      tunnels.push({
        id: code,
        code,
        ports,
        pids,
        cmd: cmdFile || null,
        ps,
      });
    } else if (ps.length) {
      // No code file but websocat processes running.
      tunnels.push({ id: 'unmanaged', code: null, ports: [], pids: [], cmd: null, ps });
    }
    return tunnels;
  }

  function tnRenderRow(t) {
    const row = document.createElement('div');
    row.className = 'tn-row';
    row.dataset.code = t.code || '';

    const head = document.createElement('div');
    head.innerHTML = '<span class="tn-code">' + (t.code ? 'code: ' + t.code : '(no pairing code)') + '</span>';
    row.appendChild(head);

    if (t.ports && t.ports.length) {
      const meta = document.createElement('div');
      meta.className = 'tn-meta';
      meta.textContent = 'ports: ' + t.ports.join(', ');
      row.appendChild(meta);
    }
    if (t.pids && t.pids.length) {
      const meta = document.createElement('div');
      meta.className = 'tn-meta';
      meta.textContent = 'pids: ' + t.pids.join(' ') + ' (' + t.pids.length + ' bridge proc' + (t.pids.length === 1 ? '' : 's') + ')';
      row.appendChild(meta);
    }
    if (t.ps && t.ps.length) {
      const meta = document.createElement('div');
      meta.className = 'tn-meta';
      meta.textContent = 'ps: ' + t.ps.length + ' matching process' + (t.ps.length === 1 ? '' : 'es');
      meta.title = t.ps.join('\n');
      row.appendChild(meta);
    }

    const relay = document.createElement('div');
    relay.className = 'tn-meta';
    relay.textContent = 'relay: querying…';
    row.appendChild(relay);

    if (t.code) {
      tnFetchRelayStatus(t.code).then(s => {
        if (!s) {
          relay.className = 'tn-meta tn-relay-err';
          relay.textContent = 'relay: unreachable';
          return;
        }
        const active = !!s.active;
        const guestPorts = (s.guest_ports && Object.keys(s.guest_ports)) || [];
        const queueDepth = s.guest_queue_depth || {};
        const pairs = s.active_pairs || {};
        const age = (typeof s.age_s === 'number') ? Math.round(s.age_s) + 's' : '';
        const parts = [];
        parts.push(active ? '✓ active' : '✗ inactive');
        if (guestPorts.length) parts.push('guest=' + guestPorts.join(','));
        if (Object.keys(pairs).length) parts.push('pairs=' + JSON.stringify(pairs));
        if (Object.keys(queueDepth).length) parts.push('queue=' + JSON.stringify(queueDepth));
        if (age) parts.push('age=' + age);
        relay.className = 'tn-meta ' + (active && guestPorts.length ? 'tn-relay-ok' : (active ? 'tn-relay-warn' : 'tn-relay-err'));
        relay.textContent = 'relay: ' + parts.join('  ');
        relay.title = JSON.stringify(s, null, 2);
      });
    } else {
      relay.className = 'tn-meta tn-relay-warn';
      relay.textContent = 'relay: (no code)';
    }

    const cmdShown = t.code ? tnEffectiveCmd(t.code) : (t.cmd || TUNNEL_DEFAULT_CMD);
    const cmdEl = document.createElement('div');
    cmdEl.className = 'tn-cmd';
    cmdEl.textContent = '$ ' + cmdShown;
    if (t.code && tnGetCmdOverride(t.code)) cmdEl.title = 'overridden via localStorage';
    row.appendChild(cmdEl);

    const actions = document.createElement('div');
    actions.className = 'tn-actions';
    const btnRestart = document.createElement('button');
    btnRestart.textContent = 'restart';
    btnRestart.onclick = () => tnRestartTunnel(t);
    const btnStop = document.createElement('button');
    btnStop.textContent = 'stop';
    btnStop.onclick = () => tnStopTunnel(t);
    const btnEdit = document.createElement('button');
    btnEdit.textContent = 'edit cmd';
    btnEdit.onclick = () => tnEditCmd(t);
    const btnTunSsh = document.createElement('button');
    btnTunSsh.textContent = 'tunnel ssh';
    btnTunSsh.title = 'Copy the tunnel-to-localhost command to clipboard. Paste it into a terminal on your host (Mac) to open a local TCP listener bridged to this guest tunnel, then ssh -p 2222 root@localhost.';
    btnTunSsh.disabled = !t.code;
    btnTunSsh.onclick = () => tnCopyTunnelListen(t);
    actions.appendChild(btnRestart);
    actions.appendChild(btnStop);
    actions.appendChild(btnEdit);
    actions.appendChild(btnTunSsh);
    row.appendChild(actions);

    return row;
  }

  async function tnRefresh() {
    if (!emulator) {
      tunnelsListEl.innerHTML = '<div class="tn-row tn-empty">boot v86 first</div>';
      return;
    }
    tunnelsListEl.innerHTML = '<div class="tn-row tn-empty">scanning guest…</div>';
    let tunnels = [];
    try {
      tunnels = await tnDiscoverTunnels();
    } catch (e) {
      tunnelsListEl.innerHTML = '';
      tnLog('discover failed: ' + (e && e.message || e), 'err');
      return;
    }
    tunnelsListEl.innerHTML = '';
    if (!tunnels.length) {
      const empty = document.createElement('div');
      empty.className = 'tn-row tn-empty';
      empty.innerHTML =
        'no tunnels detected. start one with the default command below or click <b>restart</b> after editing.<br>' +
        '<div class="tn-cmd" style="margin-top:6px">$ ' + (tnGetCmdOverride('__default__') || TUNNEL_DEFAULT_CMD) + '</div>';
      const actions = document.createElement('div');
      actions.className = 'tn-actions';
      const startBtn = document.createElement('button');
      startBtn.textContent = 'start default';
      startBtn.onclick = () => tnRestartTunnel({ id: 'default', code: null });
      const editBtn = document.createElement('button');
      editBtn.textContent = 'edit cmd';
      editBtn.onclick = () => tnEditCmd({ id: 'default', code: null });
      actions.appendChild(startBtn);
      actions.appendChild(editBtn);
      empty.appendChild(actions);
      tunnelsListEl.appendChild(empty);
      return;
    }
    tunnels.forEach(t => tunnelsListEl.appendChild(tnRenderRow(t)));
  }

  async function tnStopTunnel(t) {
    tnLog('$ stop ' + (t.code || '(unmanaged)'), 'cmd');
    const cmd =
      'if [ -s /tmp/tunnel.pids ]; then ' +
        'while read p; do kill "$p" 2>/dev/null; done < /tmp/tunnel.pids; ' +
        'sleep 0.3; ' +
        'while read p; do kill -9 "$p" 2>/dev/null; done < /tmp/tunnel.pids; ' +
      'fi; ' +
      'pkill -f websocat 2>/dev/null; ' +
      'rm -f /tmp/tunnel.code /tmp/tunnel.pids /tmp/tunnel.cmd /tmp/tunnel.ports 2>/dev/null; ' +
      'echo stopped';
    const r = await tnExec(cmd, { timeout: 10000 });
    tnLog((r.stdout || '').trim() || '(no output)', r.exitCode === 0 ? 'ok' : 'err');
    setTimeout(tnRefresh, 400);
  }

  async function tnRestartTunnel(t) {
    const code = t.code || (t.id !== 'default' ? t.id : null);
    // Even for the default (no code yet), honor a stored __default__ override.
    const cmd = code ? tnEffectiveCmd(code) : (tnGetCmdOverride('__default__') || TUNNEL_DEFAULT_CMD);
    tnLog('$ restart ' + (code || '(default)'), 'cmd');
    tnLog(cmd, 'out');
    // Stop first so respawn loops are gone, then start fresh.
    await tnStopTunnel(t).catch(() => {});
    // Run the effective command in the background so the panel does not hang
    // on websocat's foreground respawn loop. We background it via `&` and
    // detach stdout/stderr to a log so subsequent guest commands still work.
    const wrapped = '( ' + cmd + ' ) >/tmp/tunnel.last.log 2>&1 &';
    const r = await tnExec(wrapped, { timeout: 8000 });
    tnLog('launched (exit=' + r.exitCode + ')', r.exitCode === 0 ? 'ok' : 'err');
    // tunnel-up.sh has to install packages, seed DNS, register, generate
    // ssh host keys, and start sshd before it writes /tmp/tunnel.code. On
    // a cold guest this can take 20-60s. Poll for the code instead of a
    // single timed refresh, and if it never arrives surface the log tail
    // so the user can see what failed (registration error, missing tool,
    // DNS, etc).
    tnPollForCode(60000).catch(() => {});
  }

  // Watches /tmp/tunnel.code for up to `maxMs` ms. On success: refresh the
  // panel. On timeout: dump tail of /tmp/tunnel.last.log to the log pane.
  async function tnPollForCode(maxMs) {
    const start = Date.now();
    let lastTail = '';
    while (Date.now() - start < maxMs) {
      await new Promise(r => setTimeout(r, 2000));
      const probe = await tnExec(
        'if [ -s /tmp/tunnel.code ]; then ' +
          'echo __HAVE_CODE__:$(head -1 /tmp/tunnel.code); ' +
        'else ' +
          'echo __NO_CODE__; tail -n 4 /tmp/tunnel.last.log 2>/dev/null; ' +
        'fi',
        { timeout: 5000 }
      ).catch(() => ({ stdout: '' }));
      const out = probe.stdout || '';
      if (/__HAVE_CODE__:/.test(out)) {
        const code = (out.match(/__HAVE_CODE__:([A-Z0-9]+)/) || [])[1];
        if (code) tnLog('pairing code: ' + code, 'ok');
        tnRefresh();
        return;
      }
      // Stream new log tail so the user sees progress (apk add, DoH seed, etc).
      const tailMatch = out.replace(/^[\s\S]*?__NO_CODE__\n?/, '');
      const tail = (tailMatch || '').trim();
      if (tail && tail !== lastTail) {
        tail.split('\n').forEach(line => tnLog(line, 'out'));
        lastTail = tail;
      }
    }
    // Timed out — dump full log tail.
    const dump = await tnExec(
      'echo __FINAL_TAIL__; tail -n 30 /tmp/tunnel.last.log 2>/dev/null; ' +
      'echo __WEBSOCAT__; command -v websocat || echo missing; ' +
      'echo __PROCS__; ps | grep -E "websocat|tunnel-up" | grep -v grep || true',
      { timeout: 6000 }
    ).catch(() => ({ stdout: '' }));
    tnLog('no pairing code after ' + Math.round(maxMs / 1000) + 's — dumping log:', 'err');
    (dump.stdout || '').split('\n').forEach(line => {
      if (line) tnLog(line, 'err');
    });
    tnRefresh();
  }

  function tnEditCmd(t) {
    const code = t.code || (t.id && t.id !== 'default' ? t.id : null);
    const current = code ? tnEffectiveCmd(code) : (tnGetCmdOverride('__default__') || TUNNEL_DEFAULT_CMD);
    const next = window.prompt(
      'Edit start command for ' + (code ? 'code ' + code : 'default tunnel') +
      '.\n\nLeave empty to clear override and revert to default.',
      current
    );
    if (next === null) return; // cancelled
    if (!code) {
      // No code yet — store as default override under sentinel key.
      tnSetCmdOverride('__default__', next);
      tnLog('default cmd updated', 'ok');
    } else {
      tnSetCmdOverride(code, next);
      tnLog('override saved for ' + code + (next.trim() ? '' : ' (cleared)'), 'ok');
    }
    tnRefresh();
  }

  async function tnCopyTunnelListen(t) {
    const code = t.code || (t.id && t.id !== 'default' ? t.id : null);
    if (!code) {
      tnLog('no pairing code yet — start the tunnel first', 'err');
      return;
    }
    const cmd = 'sh <(curl -sS https://linuxontab.com/local/tunnel-listen.sh) ' + code;
    let copied = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(cmd);
        copied = true;
      }
    } catch (_) {}
    if (!copied) {
      try {
        const ta = document.createElement('textarea');
        ta.value = cmd;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        copied = document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (_) {}
    }
    if (copied) {
      tnLog('copied to clipboard — paste in a host terminal:', 'ok');
      tnLog('$ ' + cmd, 'out');
      tnLog('then: ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@localhost', 'hint');
    } else {
      tnLog('clipboard copy failed; copy manually:', 'err');
      tnLog('$ ' + cmd, 'out');
    }
  }

  tunnelsBtn.onclick = () => {
    if (!emulator) { setStatus('boot v86 first', 'err'); return; }
    if (!tunnelsPanel.hidden) {
      // toggle off
      tunnelsPanel.hidden = true;
      term.focus();
      return;
    }
    // mutually exclusive with social/follow panel
    if (followPanel && !followPanel.hidden) followPanel.hidden = true;
    tunnelsPanel.hidden = false;
    tnRefresh();
  };
  tunnelsCloseBtn.onclick = () => { tunnelsPanel.hidden = true; term.focus(); };
  tunnelsRefreshBtn.onclick = () => tnRefresh();

  setInterval(() => { tunnelsBtn.disabled = !emulator; }, 800);

  // ?autoboot=1 [&restore=0|1]
  // When `restore` is unspecified, auto-restore if a snapshot exists for the
  // current iso (the common SPA case at /shell — users save snapshots and
  // expect file persistence across reloads). Pass `&restore=0` for a clean boot.
  const qs = new URLSearchParams(location.search);
  if (qs.get('autoboot') === '1') {
    window.__v86AutoLogin = true;
    (async () => {
      const restoreParam = qs.get('restore');
      // Resolve restore intent against the current snapshot dropdown
      // selection (a fresh-boot entry → no restore; a real snapshot key
      // → restore unless ?restore=0).
      const sel = parseSel(snapEl.value);
      let wantRestore;
      if (restoreParam === '1') wantRestore = !!(sel && !sel.isFresh);
      else if (restoreParam === '0') wantRestore = false;
      else wantRestore = !!(sel && !sel.isFresh && await idbHas(sel.key).catch(() => false));
      boot({ restore: wantRestore });
    })();
  }
})();
</script>
</body>
</html>
