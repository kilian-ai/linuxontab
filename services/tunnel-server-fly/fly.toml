app = "linuxontab-tunnel"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  # Public wss URL announced to clients — set to the custom domain once mapped:
  # TUNNEL_PUBLIC_URL = "wss://tunnel.linuxontab.com"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
